<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Task 2 Collocation Flashcards Advanced - Standalone</title>
  <style>
:root {
  --bg: #f6f2ea;
  --ink: #202124;
  --muted: #69645b;
  --panel: #fffdf8;
  --line: #e3dbce;
  --shadow: 0 18px 46px rgba(37, 31, 22, 0.14);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  background:
    linear-gradient(120deg, rgba(37, 99, 235, 0.08), transparent 28%),
    linear-gradient(240deg, rgba(220, 38, 38, 0.08), transparent 30%),
    var(--bg);
  color: var(--ink);
  font-family: Inter, "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans SC", sans-serif;
}

.app-header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 24px;
  padding: 42px clamp(20px, 5vw, 72px) 28px;
  border-bottom: 1px solid var(--line);
  background: rgba(255, 253, 248, 0.84);
  backdrop-filter: blur(18px);
}

.is-study-mode .app-header {
  align-items: center;
  padding: 22px clamp(18px, 4vw, 56px) 18px;
  border-bottom: 0;
  background-color: var(--active-topic, #2563eb);
  background-image: linear-gradient(135deg, var(--active-topic, #2563eb), color-mix(in srgb, var(--active-topic, #2563eb), #111 18%));
  color: #fff;
}

.is-study-mode .app-header h1 {
  font-size: clamp(28px, 3.2vw, 44px);
}

.is-study-mode .eyebrow,
.is-study-mode .page-subtitle {
  color: rgba(255, 255, 255, 0.82);
}

.is-study-mode .page-subtitle {
  display: none;
  max-width: min(760px, 58vw);
  margin-top: 8px;
  font-size: 15px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.is-study-mode .stats {
  min-width: 92px;
  padding: 10px 14px;
  border-color: rgba(255, 255, 255, 0.32);
  background: rgba(255, 255, 255, 0.14);
  color: #fff;
}

.is-study-mode .study-nav {
  display: none;
}

.eyebrow {
  margin: 0 0 8px;
  color: var(--muted);
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

h1 {
  margin: 0;
  font-size: clamp(36px, 5vw, 66px);
  line-height: 1;
  letter-spacing: 0;
}

.page-subtitle {
  max-width: 760px;
  margin: 14px 0 0;
  color: var(--muted);
  font-size: clamp(15px, 2vw, 18px);
  line-height: 1.5;
}

.stats {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  min-width: 104px;
  padding: 12px 16px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
  color: var(--muted);
  font-weight: 900;
  justify-content: center;
}

main {
  padding: 30px clamp(16px, 4vw, 56px) 58px;
}

.topic-landing {
  display: grid;
  gap: 22px;
}

.landing-intro {
  max-width: 900px;
}

.landing-intro h2 {
  margin: 0;
  max-width: 820px;
  font-size: clamp(28px, 4vw, 52px);
  line-height: 1.04;
  letter-spacing: 0;
}

.topic-gallery {
  display: grid;
  grid-template-columns: repeat(5, minmax(160px, 1fr));
  gap: 14px;
}

.topic-tile {
  --topic: #2563eb;
  --accent: #38bdf8;
  position: relative;
  display: grid;
  grid-template-rows: 156px 1fr;
  min-height: 352px;
  height: auto;
  padding: 0;
  border: 1px solid color-mix(in srgb, var(--topic), #ffffff 66%);
  border-radius: 8px;
  overflow: hidden;
  background: var(--panel);
  color: var(--ink);
  text-align: left;
  box-shadow: 0 12px 28px rgba(37, 31, 22, 0.08);
  cursor: pointer;
  animation: tile-in 420ms ease both;
  animation-delay: var(--delay);
}

.topic-tile:hover,
.topic-tile:focus-visible {
  transform: translateY(-3px);
  border-color: var(--topic);
  box-shadow: var(--shadow);
  outline: 0;
}

.tile-visual {
  position: relative;
  display: block;
  min-height: 156px;
  background:
    linear-gradient(135deg, color-mix(in srgb, var(--topic), #111 18%), color-mix(in srgb, var(--accent), #fff 18%));
  overflow: hidden;
}

.concept-plane,
.concept-line,
.concept-tag {
  position: absolute;
  display: block;
}

.concept-plane {
  border: 1px solid rgba(255, 255, 255, 0.48);
  background: rgba(255, 255, 255, 0.14);
  transform: skewX(-12deg);
}

.plane-a {
  width: 66%;
  height: 62px;
  left: -8%;
  top: 24px;
}

.plane-b {
  width: 58%;
  height: 46px;
  right: -9%;
  bottom: 24px;
}

.concept-line {
  height: 2px;
  background: rgba(255, 255, 255, 0.74);
  transform-origin: left center;
}

.concept-line-a {
  width: 78%;
  left: 18px;
  top: 36px;
  transform: rotate(-10deg);
}

.concept-line-b {
  width: 62%;
  right: 18px;
  bottom: 44px;
  transform: rotate(-10deg);
}

.concept-tag {
  max-width: 90px;
  padding: 6px 8px;
  border: 1px solid rgba(255, 255, 255, 0.46);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.18);
  color: #fff;
  font-size: 11px;
  font-weight: 900;
  text-transform: uppercase;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.tag-a {
  left: 18px;
  bottom: 18px;
}

.tag-b {
  right: 16px;
  top: 18px;
}

.tag-c {
  left: 50%;
  top: 72px;
  transform: translateX(-50%);
}

.tile-content {
  display: grid;
  grid-template-rows: auto auto 1fr auto;
  gap: 8px;
  min-height: 196px;
  padding: 18px;
}

.tile-kicker {
  color: var(--topic);
  font-size: 13px;
  font-weight: 900;
}

.tile-title {
  font-size: 24px;
  font-weight: 950;
  line-height: 1.1;
}

.tile-copy {
  color: var(--muted);
  font-size: 14px;
  line-height: 1.42;
}

.tile-count {
  justify-self: start;
  padding: 7px 10px;
  border-left: 6px solid var(--topic);
  background: color-mix(in srgb, var(--topic), #fff 91%);
  color: color-mix(in srgb, var(--topic), #111 24%);
  font-size: 12px;
  font-weight: 900;
}

.study-page {
  display: grid;
  gap: 18px;
}

.study-page[hidden],
.topic-landing[hidden],
.bank-page[hidden] {
  display: none;
}

.study-nav {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  flex-wrap: wrap;
}

.back-button {
  border-color: #27272a;
  background: #27272a;
  color: #fff;
}

.toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: end;
}

.search-box,
.mode-box {
  display: grid;
  gap: 6px;
  min-width: min(100%, 340px);
  color: var(--muted);
  font-size: 13px;
  font-weight: 800;
}

input,
button,
select {
  font: inherit;
}

input,
select {
  width: 100%;
  height: 44px;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 0 14px;
  background: #fff;
  color: var(--ink);
}

.mode-box {
  min-width: min(100%, 200px);
}

button {
  height: 44px;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 0 14px;
  background: #fff;
  color: var(--ink);
  font-weight: 850;
  cursor: pointer;
  transition: transform 180ms ease, border-color 180ms ease, color 180ms ease, box-shadow 180ms ease;
}

button:hover,
button.is-active {
  border-color: var(--topic);
  color: var(--topic);
}

.button-icon {
  width: 20px;
  height: 20px;
  fill: none;
  stroke: currentColor;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.icon-button {
  display: inline-grid;
  width: 44px;
  min-width: 44px;
  padding: 0;
  place-items: center;
}

#zenButton {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  min-width: 136px;
  border-color: transparent;
  background:
    linear-gradient(135deg, color-mix(in srgb, var(--topic), #111 8%), color-mix(in srgb, var(--topic), #fff 18%));
  color: #fff;
  box-shadow: 0 14px 30px color-mix(in srgb, var(--topic), transparent 72%);
}

#zenButton:hover,
#zenButton:focus-visible {
  transform: translateY(-2px);
  border-color: color-mix(in srgb, var(--topic), #fff 22%);
  color: #fff;
  box-shadow: 0 18px 38px color-mix(in srgb, var(--topic), transparent 62%);
}

#continueZenButton {
  border-color: #27272a;
  background: #27272a;
  color: #fff;
}

#continueZenButton:hover,
#continueZenButton:focus-visible {
  border-color: #27272a;
  color: #fff;
  box-shadow: var(--shadow);
}

#continueZenButton[hidden] {
  display: none;
}

.topic-tile {
  height: auto;
  padding: 0;
  color: var(--ink);
}

.topic-tile:hover,
.topic-tile:focus-visible {
  color: var(--ink);
}

.back-button:hover,
.back-button:focus-visible {
  border-color: #27272a;
  color: #fff;
}

.topic-filters {
  display: flex;
  gap: 10px;
  flex: 1;
  flex-wrap: nowrap;
  overflow-x: auto;
  padding-bottom: 2px;
  scrollbar-width: thin;
}

.topic-filter {
  --topic: #556;
  flex: 0 0 auto;
  border-left: 8px solid var(--topic);
}

.topic-sections {
  display: grid;
  gap: 32px;
}

.collocation-bank {
  --topic: #27272a;
  display: grid;
  gap: 14px;
  padding: 18px;
  border: 1px solid var(--line);
  border-left: 10px solid #27272a;
  border-radius: 8px;
  background: rgba(255, 253, 248, 0.78);
  box-shadow: 0 10px 30px rgba(37, 31, 22, 0.08);
}

.collocation-bank.is-compact {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  min-height: 56px;
  padding: 10px 12px;
  border-left-width: 8px;
}

.bank-compact-copy {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}

.bank-compact-copy strong {
  font-size: 14px;
}

.bank-compact-copy span {
  color: var(--muted);
  font-size: 13px;
  font-weight: 900;
}

.compact-open {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 36px;
  padding: 0 10px;
  font-size: 13px;
}

.bank-heading {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
}

.bank-heading h2 {
  margin: 0;
  font-size: 24px;
  letter-spacing: 0;
}

.bank-count {
  padding: 8px 10px;
  border-radius: 8px;
  background: #27272a;
  color: #fff;
  font-size: 12px;
  font-weight: 950;
  white-space: nowrap;
}

.bank-empty {
  margin: 0;
  color: var(--muted);
  font-weight: 750;
  line-height: 1.5;
}

.bank-open {
  justify-self: start;
  border-color: #27272a;
  background: #27272a;
  color: #fff;
}

.bank-open:hover,
.bank-open:focus-visible {
  border-color: #27272a;
  color: #fff;
  box-shadow: var(--shadow);
}

.bank-page {
  display: grid;
  gap: 18px;
}

.bank-page-header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 18px;
  padding: clamp(20px, 4vw, 36px);
  border: 1px solid var(--line);
  border-left: 12px solid #27272a;
  border-radius: 8px;
  background: rgba(255, 253, 248, 0.86);
  box-shadow: 0 10px 30px rgba(37, 31, 22, 0.08);
}

.bank-page-header h2 {
  margin: 0;
  font-size: clamp(30px, 5vw, 56px);
  line-height: 1;
}

.bank-page-actions {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: flex-end;
}

.bank-page-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 10px;
}

.bank-item {
  --topic: #5865f2;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  align-items: center;
  padding: 12px;
  border: 1px solid color-mix(in srgb, var(--topic), #fff 66%);
  border-radius: 8px;
  background: color-mix(in srgb, var(--topic), #fff 93%);
}

.bank-copy {
  display: grid;
  gap: 4px;
  min-width: 0;
}

.bank-copy strong,
.bank-copy span {
  overflow-wrap: anywhere;
}

.bank-topic {
  color: var(--topic);
  font-size: 11px;
  font-weight: 950;
  text-transform: uppercase;
}

.bank-remove {
  height: 34px;
  padding: 0 10px;
  color: var(--topic);
  border-color: color-mix(in srgb, var(--topic), #fff 52%);
  background: #fff;
  font-size: 12px;
}

.topic-section {
  --topic: #5865f2;
  border-top: 10px solid var(--topic);
  padding-top: 16px;
}

.topic-heading {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 16px;
}

.topic-label {
  margin: 0 0 4px;
  color: var(--topic);
  font-size: 13px;
  font-weight: 950;
}

.topic-heading h2 {
  margin: 0;
  font-size: 30px;
}

.topic-count {
  color: var(--muted);
  font-weight: 900;
}

.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px;
}

.flashcard-shell {
  --topic: #5865f2;
  display: grid;
  gap: 10px;
  align-items: stretch;
}

.collocation-panel {
  display: grid;
  gap: 8px;
}

.card-tools {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  min-height: 34px;
  flex-wrap: wrap;
}

.card-tool-label {
  color: var(--topic);
  font-size: 12px;
  font-weight: 950;
  text-transform: uppercase;
}

.card-tool-actions {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-left: auto;
}

.flashcard {
  --topic: inherit;
  position: relative;
  width: 100%;
  min-height: 190px;
  border: 0;
  border-radius: 8px;
  padding: 0;
  perspective: 1000px;
  background: transparent;
  text-align: left;
}

.mark-button,
.zen-start-button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  height: 32px;
  padding: 0 10px;
  border-color: color-mix(in srgb, var(--topic), #fff 55%);
  background: rgba(255, 255, 255, 0.92);
  color: var(--topic);
  font-size: 12px;
  font-weight: 950;
  box-shadow: 0 8px 20px rgba(37, 31, 22, 0.12);
}

.mark-button {
  min-width: 86px;
}

.zen-start-button {
  min-width: 54px;
  background: color-mix(in srgb, var(--topic), #fff 90%);
}

.mark-button:hover,
.mark-button:focus-visible,
.mark-button.is-marked,
.zen-start-button:hover,
.zen-start-button:focus-visible {
  border-color: var(--topic);
  background: var(--topic);
  color: #fff;
}

.mark-icon {
  display: inline-grid;
  width: 18px;
  height: 18px;
  place-items: center;
  border-radius: 50%;
  background: color-mix(in srgb, currentColor, transparent 84%);
  font-size: 14px;
  line-height: 1;
}

.flashcard:hover .card-face,
.flashcard:focus-visible .card-face {
  box-shadow: var(--shadow);
}

.flashcard.is-flipped .card-inner {
  transform: rotateY(180deg);
}

.card-inner {
  position: absolute;
  inset: 0;
  transition: transform 240ms ease;
  transform-style: preserve-3d;
}

.card-face {
  position: absolute;
  inset: 0;
  display: grid;
  grid-template-rows: auto 1fr auto;
  gap: 12px;
  min-height: 190px;
  padding: 18px;
  border: 1px solid color-mix(in srgb, var(--topic), #fff 55%);
  border-radius: 8px;
  background: var(--panel);
  backface-visibility: hidden;
  overflow: hidden;
}

.card-back {
  transform: rotateY(180deg);
  background: color-mix(in srgb, var(--topic), #fff 88%);
}

.card-type {
  color: var(--topic);
  font-size: 12px;
  font-weight: 950;
  text-transform: uppercase;
}

.card-text {
  align-self: center;
  font-size: 22px;
  line-height: 1.35;
  font-weight: 650;
  word-break: break-word;
}

.card-meta {
  color: var(--muted);
  font-size: 12px;
  font-weight: 850;
}

.highlight {
  color: var(--topic);
  font-weight: 950;
}

.synonym-network {
  border: 1px solid color-mix(in srgb, var(--topic), #fff 64%);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.72);
  overflow: hidden;
}

.synonym-network > summary,
.synonym-group > summary {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  min-height: 42px;
  padding: 10px 12px;
  color: var(--topic);
  font-size: 12px;
  font-weight: 950;
  text-transform: uppercase;
  cursor: pointer;
  list-style: none;
}

.synonym-network > summary::-webkit-details-marker,
.synonym-group > summary::-webkit-details-marker {
  display: none;
}

.synonym-network > summary::after,
.synonym-group > summary::after {
  content: "+";
  display: inline-grid;
  flex: 0 0 auto;
  width: 22px;
  height: 22px;
  place-items: center;
  border-radius: 50%;
  background: color-mix(in srgb, var(--topic), #fff 85%);
  color: var(--topic);
  font-size: 14px;
  line-height: 1;
}

.synonym-network[open] > summary::after,
.synonym-group[open] > summary::after {
  content: "–";
}

.synonym-network-body {
  display: grid;
  gap: 10px;
  padding: 0 12px 12px;
}

.synonym-expression {
  color: var(--muted);
  font-size: 12px;
  font-weight: 800;
}

.synonym-keyword,
.synonym-expression {
  overflow-wrap: anywhere;
}

.synonym-group {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
}

.synonym-group > summary {
  align-items: flex-start;
  text-transform: none;
}

.synonym-keyword {
  font-size: 14px;
  text-transform: none;
}

.synonym-expression {
  margin-left: auto;
  text-align: right;
  text-transform: none;
}

.synonym-list {
  display: grid;
  gap: 8px;
  margin: 0;
  padding: 0 10px 10px;
  list-style: none;
}

.synonym-item {
  display: grid;
  gap: 5px;
  padding: 10px;
  border-radius: 8px;
  background: #fff;
  box-shadow: 0 8px 20px rgba(37, 31, 22, 0.08);
}

.synonym-item-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
}

.synonym-item-head strong {
  color: var(--ink);
  line-height: 1.25;
  overflow-wrap: anywhere;
}

.synonym-zh,
.synonym-tone {
  margin: 0;
  font-size: 13px;
  line-height: 1.45;
}

.synonym-zh,
.synonym-tone {
  color: var(--muted);
}

.stance-tag {
  flex: 0 0 auto;
  padding: 4px 7px;
  border-radius: 999px;
  font-size: 10px;
  font-weight: 950;
  text-transform: uppercase;
}

.stance-positive {
  background: #dcfce7;
  color: #166534;
}

.stance-neutral {
  background: #e5e7eb;
  color: #374151;
}

.stance-negative {
  background: #fee2e2;
  color: #991b1b;
}

.empty-state {
  padding: 34px;
  border: 1px dashed var(--line);
  border-radius: 8px;
  background: var(--panel);
  color: var(--muted);
  font-weight: 850;
}

.zen-page[hidden] {
  display: none;
}

.study-page.is-zen .toolbar,
.study-page.is-zen .collocation-bank,
.study-page.is-zen .topic-sections {
  display: none;
}

.zen-page {
  --topic: #5865f2;
  display: grid;
  gap: 18px;
  min-height: min(620px, calc(100vh - 220px));
  padding: clamp(18px, 4vw, 44px);
  border-top: 12px solid var(--topic);
  border-radius: 8px;
  background:
    linear-gradient(135deg, color-mix(in srgb, var(--topic), #fff 90%), rgba(255, 253, 248, 0.96) 54%),
    var(--panel);
  box-shadow: var(--shadow);
}

.zen-topbar {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 18px;
}

.zen-topbar h2 {
  margin: 0;
  font-size: clamp(28px, 4vw, 48px);
}

.zen-actions {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: flex-end;
}

.zen-count {
  min-width: 82px;
  padding: 10px 12px;
  border-radius: 8px;
  background: #27272a;
  color: #fff;
  font-size: 13px;
  font-weight: 950;
  text-align: center;
}

.zen-jump-control {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--muted);
  font-size: 12px;
  font-weight: 900;
}

.zen-jump-input {
  width: 74px;
  height: 38px;
  padding: 0 10px;
}

.zen-jump-button {
  height: 38px;
}

.zen-card {
  --topic: inherit;
  position: relative;
  min-height: clamp(360px, 56vh, 560px);
  width: 100%;
  min-width: 0;
  justify-self: stretch;
  padding: 0;
  border: 0;
  border-radius: 8px;
  background: transparent;
  color: var(--ink);
  text-align: left;
  perspective: 1200px;
}

.zen-review {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
}

.zen-review-state {
  min-width: 126px;
  padding: 9px 12px;
  border-radius: 8px;
  background: color-mix(in srgb, var(--topic), #fff 88%);
  color: var(--topic);
  font-size: 13px;
  font-weight: 950;
  text-align: center;
}

.zen-review-button {
  min-width: 128px;
}

.zen-review-button.is-active,
.zen-review-button:hover,
.zen-review-button:focus-visible {
  border-color: var(--topic);
  background: var(--topic);
  color: #fff;
}

.zen-stage {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(320px, 420px);
  align-items: stretch;
  gap: 18px;
  width: min(100%, 1120px);
  justify-self: center;
}

.zen-synonym-panel {
  display: grid;
  grid-template-rows: auto auto 1fr;
  gap: 12px;
  min-height: clamp(360px, 56vh, 560px);
  max-height: clamp(360px, 56vh, 560px);
  min-width: 0;
  padding: 14px;
  border: 1px solid color-mix(in srgb, var(--topic), #fff 58%);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.88);
  overflow: auto;
}

.zen-synonym-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
}

.zen-synonym-head h3 {
  margin: 0;
  font-size: 22px;
  line-height: 1.1;
}

.zen-synonym-group {
  display: grid;
  gap: 10px;
  min-width: 0;
}

.zen-synonym-panel .synonym-list {
  padding: 0;
}

.zen-card:hover .zen-face,
.zen-card:focus-visible .zen-face {
  box-shadow: var(--shadow);
}

.zen-card.is-flipped .zen-inner {
  transform: rotateY(180deg);
}

.zen-inner {
  position: absolute;
  inset: 0;
  transition: transform 520ms cubic-bezier(0.2, 0.72, 0.18, 1);
  transform-style: preserve-3d;
  will-change: transform;
}

.zen-face {
  position: absolute;
  inset: 0;
  display: grid;
  grid-template-rows: auto 1fr auto;
  gap: 18px;
  min-height: 100%;
  padding: clamp(24px, 5vw, 56px);
  border: 1px solid color-mix(in srgb, var(--topic), #fff 44%);
  border-radius: 8px;
  background: var(--panel);
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  overflow: hidden;
}

.zen-back {
  transform: rotateY(180deg);
  background: color-mix(in srgb, var(--topic), #fff 88%);
}

.zen-text {
  align-self: center;
  display: block;
  font-size: clamp(32px, 6vw, 74px);
  line-height: 1.12;
  font-weight: 750;
  overflow-wrap: anywhere;
}

@keyframes tile-in {
  from {
    opacity: 0;
    transform: translateY(10px);
  }

  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@media (max-width: 1180px) {
  .topic-gallery {
    grid-template-columns: repeat(3, minmax(180px, 1fr));
  }
}

@media (max-width: 760px) {

    align-items: flex-start;

  .stats {

  }

  .zen-topbar,

    align-items: stretch;
    flex-direction: column;
  }

  .zen-card {

  .zen-stage {

    align-items: stretch;
    flex-direction: column;
  }

  .synonym-expression {
    margin-left: 0;
    text-align: left;
  }
}

    const seed = Array.from(String(text || topic)).reduce((sum, char) => sum + char.charCodeAt(0), 0);
    return pool[seed % pool.length];
  }

  function hasContext(sentence, context) {
    const lower = String(sentence || "").toLowerCase();
    return lower.includes(`in ${context}`) || lower.includes(scenes[context].split(" ").slice(0, 3).join(" ").toLowerCase());
  }

  function review(sentence, context) {
    const issues = [];
    if (!sentence) issues.push("missing-sentence");
    if (!hasContext(sentence, context)) issues.push("missing-micro-context");
    if (genericPatterns.some((pattern) => pattern.test(sentence))) issues.push("generic-template");
    return issues;
  }

  function expressionFromKey(key) {
    return String(key || "").split("::").pop() || "this expression";
  }

  function rewriteSentence(key, topic, level, context) {
    const expression = expressionFromKey(key);
    const isVerb = key.includes("::verb::");
    const subject = isVerb ? `efforts to ${expression}` : expression;
    const detail = level === "advanced"
      ? "create a clearer argument with a specific cause, audience, and result"
      : "give the sentence a clear situation instead of a vague general claim";
    return `In ${context}, ${subject} can help ${scenes[context]} ${detail}.`;
  }

  Object.entries(bank).forEach(([key, levels]) => {
    const topic = key.split("::")[0];
    Object.entries(levels || {}).forEach(([level, item]) => {
      if (!item || typeof item.en !== "string") return;
      report.reviewedSentences += 1;
      const context = item.microContext || chooseContext(topic, `${key}-${level}-${item.en}`);
      const issues = review(item.en, context);
      item.microContext = context;
      item.selfReview = {
        passed: issues.length === 0,
        issues
      };
      if (issues.length > 0) {
        issues.forEach(note);
        item.originalEn = item.en;
        item.en = rewriteSentence(key, topic, level, context);
        item.selfReview.rewritten = true;
        report.rewrittenSentences += 1;
      }
    });
  });

  window.SENTENCE_GENERATION_REVIEW = report;
})();

  /\bnowadays\b/i,
  /\bplays? an? important role\b/i,
  /\bis very important\b/i,
  /\bcan help people\b/i,

];

const QUALITY_REVIEW_REPORT = {
  reviewedOptions: 0,
  rewrittenOptions: 0,
  issueCounts: {}
};

function normalizeSynonymKey(value) {
  return String(value || "")
    .toLowerCase()
    .replace(/\s*\/\s*.*/, "")
    .replace(/^highly\s+/, "")
    .trim();
}

function pickMicroContext(topic, seedText) {
  const pool = TOPIC_MICRO_CONTEXTS[topic] || MICRO_CONTEXTS;
  const seed = Array.from(String(seedText || topic)).reduce((sum, char) => sum + char.charCodeAt(0), 0);
  return pool[seed % pool.length];
}

function pickScene(context, seedText) {
  const scenes = CONTEXT_SCENES[context] || CONTEXT_SCENES.education;
  const seed = Array.from(String(seedText || context)).reduce((sum, char) => sum + char.charCodeAt(0), 0);
  return scenes[seed % scenes.length];
}

function getSynonymDrafts(term, type) {
  const key = normalizeSynonymKey(term);
  return SYNONYM_DRAFTS[key] || SYNONYM_FALLBACKS[type] || SYNONYM_FALLBACKS.adjective;
}

function replaceFirstWordPhrase(text, from, to) {
  const source = String(text || "");
  const pattern = new RegExp(`^${escapeRegExp(String(from || ""))}(\\b|\\s|$)`, "i");
  if (pattern.test(source)) return source.replace(pattern, `${to}$1`).replace(/\s+/g, " ").trim();
  return source.replace(new RegExp(escapeRegExp(String(from || "")), "i"), to).replace(/\s+/g, " ").trim();
}

function escapeRegExp(value) {
  return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
}

function buildAlternativeExpression(card, synonymTerm) {
  if (card.type === "adjective") {
    return replaceFirstWordPhrase(card.backEnglish, card.highlightEnglish, synonymTerm);
  }
  return replaceFirstWordPhrase(card.backEnglish, card.highlightEnglish, synonymTerm);
}

function buildExampleSubject(card, phrase) {
  if (card.type === "verb") return `efforts to ${phrase}`;
  return phrase;
}

function createMicroContextExample(card, option, phrase, context) {
  const subject = buildExampleSubject(card, phrase);
  const scene = pickScene(context, `${card.topic}-${phrase}-${option.term}`);
  const endings = {
    education: "give learners clearer practice instead of another abstract explanation",
    environment: "turn a broad environmental goal into visible local action",
    workplace: "reduce delays when teams have to finish a project under pressure",
    "government policy": "make a public decision easier for ordinary citizens to understand",
    "family life": "help households make a concrete choice instead of relying on vague advice",
    "technology use": "solve a practical problem without adding unnecessary digital stress",
    "public health": "reach vulnerable residents before a small risk becomes a wider crisis",
    "urban life": "improve daily routines for commuters, tenants, and local businesses",
    "media influence": "help audiences judge information more carefully before sharing it",
    "personal finance": "help young adults make safer choices before they borrow or spend money"
  };
  return `In ${context}, ${subject} can help ${scene} ${endings[context]}.`;
}

function hasMicroContext(example, context) {
  const lower = String(example || "").toLowerCase();
  if (lower.includes(`in ${context}`)) return true;
  return (CONTEXT_SCENES[context] || []).some((scene) => lower.includes(scene.toLowerCase().split(" ").slice(0, 3).join(" ")));
}

function reviewSynonymOption(card, option, phrase, usedOpenings) {
  const issues = [];
  const example = String(option.example || "");
  const context = option.microContext || pickMicroContext(card.topic, phrase);
  const opening = example.split(/\s+/).slice(0, 4).join(" ").toLowerCase();
  if (!example) issues.push("missing-example");
  if (!hasMicroContext(example, context)) issues.push("missing-micro-context");
  if (!example.toLowerCase().includes(String(option.term || "").toLowerCase().split(" ")[0])) issues.push("missing-synonym");
  if (GENERIC_SENTENCE_PATTERNS.some((pattern) => pattern.test(example))) issues.push("generic-template");
  if (opening && usedOpenings.has(opening)) issues.push("repeated-opening");
  return { passed: issues.length === 0, issues, context, opening };
}

function noteQualityIssues(issues) {
  issues.forEach((issue) => {
    QUALITY_REVIEW_REPORT.issueCounts[issue] = (QUALITY_REVIEW_REPORT.issueCounts[issue] || 0) + 1;
  });
}

function reviewAndRewriteSynonymOptions(card, drafts) {
  const usedOpenings = new Set();
  return drafts.slice(0, 4).map((draft) => {
    QUALITY_REVIEW_REPORT.reviewedOptions += 1;
    const phrase = buildAlternativeExpression(card, draft.term);
    const microContext = draft.microContext || pickMicroContext(card.topic, `${card.backEnglish}-${draft.term}`);
    let option = { ...draft, phrase, microContext };
    let review = reviewSynonymOption(card, option, phrase, usedOpenings);
    if (!review.passed) {
      noteQualityIssues(review.issues);
      QUALITY_REVIEW_REPORT.rewrittenOptions += 1;
      option = {
        ...option,
        example: createMicroContextExample(card, option, phrase, microContext),
        reviewNote: "Self-reviewed and rewritten for micro-context, specificity, and non-template phrasing."
      };
      review = reviewSynonymOption(card, option, phrase, usedOpenings);
    } else {
      option.reviewNote = "Self-reviewed for micro-context and template repetition.";
    }
    if (review.opening) usedOpenings.add(review.opening);
    option.reviewPassed = review.passed;
    option.reviewIssues = review.issues;
    return option;
  });
}

function buildSynonymNetworks(card) {
  const drafts = getSynonymDrafts(card.highlightEnglish, card.type);
  return [
    {
      core: card.highlightEnglish,
      coreExpression: card.backEnglish,
      role: card.type,
      options: reviewAndRewriteSynonymOptions(card, drafts)
    }
  ];
}

function makeCard(row, kind) {
  const [topic, baseChinese, baseEnglish, adjChinese, adjHighlight, adjEnglish, verbChinese, verbHighlight, verbEnglish] = row;
  const isAdjective = kind === "adjective";
  const highlightChinese = isAdjective ? adjChinese : verbChinese;
  const highlightEnglish = isAdjective ? adjHighlight : verbHighlight;
  const backEnglish = isAdjective ? adjEnglish : verbEnglish;
  const card = {
    topic,
    baseChinese,
    baseEnglish,
    type: isAdjective ? "adjective" : "verb",
    frontChinese: `${highlightChinese}${baseChinese}`,
    backEnglish,
    highlightChinese,
    highlightEnglish
  };
  card.synonymNetworks = buildSynonymNetworks(card);
  return card;
}

window.FLASHCARD_DATA = BASE_ENTRIES.flatMap((row) => [
  makeCard(row, "adjective"),
  makeCard(row, "verb")
]);
window.FLASHCARD_GENERATION_REVIEW = QUALITY_REVIEW_REPORT;

    resetButton.title = "Reset flipped cards";
    resetButton.innerHTML = iconSvg("rotate");

    bankButton.classList.add("icon-button");
    bankButton.setAttribute("aria-label", "Open collocation bank");
    bankButton.title = "Collocation bank";
    bankButton.innerHTML = iconSvg("bank");

    continueZenButton.classList.add("icon-button");
    continueZenButton.setAttribute("aria-label", "Continue Zen");
    continueZenButton.title = "Continue Zen";
    continueZenButton.innerHTML = iconSvg("play");

    zenButton.classList.add("primary-action");
    zenButton.innerHTML = `${iconSvg("focus")}<span>Zen mode</span>`;
  }

  function setNeutralHeader(subtitle = DEFAULT_SUBTITLE) {
    document.body.style.removeProperty("--active-topic");
    pageEyebrow.textContent = DEFAULT_EYEBROW;
    pageTitle.textContent = DEFAULT_TITLE;
    pageSubtitle.textContent = subtitle;
  }

  function setTopicHeader(topic) {
    const meta = topicMeta[topic];
    document.body.style.setProperty("--active-topic", meta.color);
    pageEyebrow.textContent = meta.zh;
    pageTitle.textContent = meta.label;
    pageSubtitle.textContent = meta.concept;
  }

  function synonymGroups(card) {
    return Array.isArray(card.synonymNetworks) ? card.synonymNetworks : [];
  }

  function synonymSearchText(card) {
    return synonymGroups(card).flatMap((group) => [
      group.core,
      group.coreExpression,
      group.role,
      ...(group.options || []).flatMap((option) => [
        option.term,
        option.phrase,
        option.zh,
        option.tone,
        option.stance,
        option.microContext,
        option.example,
        option.reviewNote
      ])
    ]).join(" ");
  }

  function renderStanceTag(stance) {
    const safeStance = ["Positive", "Neutral", "Negative"].includes(stance) ? stance : "Neutral";
    return `<span class="stance-tag stance-${safeStance.toLowerCase()}">${safeStance}</span>`;
  }

  function renderSynonymNetwork(card) {
    const groups = synonymGroups(card);
    if (groups.length === 0) return "";
    const groupMarkup = groups.map((group) => {
      const options = (group.options || []).map((option) => `
        <li class="synonym-item">
          <div class="synonym-item-head">
            <strong>${escapeHtml(option.phrase || option.term)}</strong>
            ${renderStanceTag(option.stance)}
          </div>
          <p class="synonym-zh">中文：${escapeHtml(option.zh || "")}</p>
          <p class="synonym-tone">语气：${escapeHtml(option.tone || "")}</p>
        </li>
      `).join("");
      return `
        <details class="synonym-group">
          <summary>
            <span class="synonym-keyword">${escapeHtml(group.core)}</span>
            <span class="synonym-expression">${escapeHtml(group.coreExpression)}</span>
          </summary>
          <ul class="synonym-list">${options}</ul>
        </details>
      `;
    }).join("");
    return `
      <details class="synonym-network">
        <summary>
          <span>Synonyms / Alternatives</span>
        </summary>
        <div class="synonym-network-body">
          ${groupMarkup}
        </div>
      </details>
    `;
  }

  function renderZenSynonymPanel(card) {
    const groups = synonymGroups(card);
    if (groups.length === 0) {
      return '<aside class="zen-synonym-panel"><p class="empty-state">No synonym alternatives for this card.</p></aside>';
    }
    const groupMarkup = groups.map((group) => {
      const options = (group.options || []).map((option) => `
        <li class="synonym-item">
          <div class="synonym-item-head">
            <strong>${escapeHtml(option.phrase || option.term)}</strong>
            ${renderStanceTag(option.stance)}
          </div>
          <p class="synonym-zh">中文：${escapeHtml(option.zh || "")}</p>
          <p class="synonym-tone">语气：${escapeHtml(option.tone || "")}</p>
        </li>
      `).join("");
      return `
        <section class="zen-synonym-group">
          <ul class="synonym-list">${options}</ul>
        </section>
      `;
    }).join("");
    return `
      <aside class="zen-synonym-panel" aria-label="Synonyms and alternatives">
        <div class="zen-synonym-head">
          <div>
            <p class="topic-label">Synonyms / Alternatives</p>
            <h3>Alternative wording</h3>
          </div>
        </div>
        ${groupMarkup}
      </aside>
    `;
  }

  function cardId(card) {
    return [
      card.topic,
      card.type,
      card.frontChinese,
      card.backEnglish
    ].join("::");
  }

  function loadBank() {
    try {
      return JSON.parse(localStorage.getItem(BANK_KEY) || "[]");
    } catch (error) {
      return [];
    }
  }

  function loadStoredObject(key) {
    try {
      const value = JSON.parse(localStorage.getItem(key) || "{}");
      return value && typeof value === "object" && !Array.isArray(value) ? value : {};
    } catch (error) {
      return {};
    }
  }

  function saveBank() {
    try {
      localStorage.setItem(BANK_KEY, JSON.stringify([...markedCards]));
    } catch (error) {
      // The bank still works during the current session if storage is blocked.
    }
  }

  function saveReviewStates() {
    try {
      localStorage.setItem(REVIEW_KEY, JSON.stringify(Object.fromEntries(reviewStates)));
    } catch (error) {
      // Review state still works during the current session if storage is blocked.
    }
  }

  function saveZenProgress() {
    if (!state.topic) return;
    try {
      localStorage.setItem(ZEN_PROGRESS_KEY, JSON.stringify({
        topic: state.topic,
        query: state.query,
        practiceMode: state.practiceMode,
        randomSalt: state.randomSalt,
        zenIndex: state.zenIndex
      }));
    } catch (error) {
      // Continuing zen is optional if storage is blocked.
    }
  }

  function loadZenProgress() {
    try {
      const value = JSON.parse(localStorage.getItem(ZEN_PROGRESS_KEY) || "null");
      if (!value || !topicOrder.includes(value.topic)) return null;
      return value;
    } catch (error) {
      return null;
    }
  }

  function updateContinueZenButton() {
    if (!continueZenButton) return;
    const progress = loadZenProgress();
    continueZenButton.hidden = !progress;
    continueZenButton.disabled = !progress;
  }

  function reviewState(card) {
    return reviewStates.get(cardId(card)) || "";
  }

  function reviewStateLabel(card) {
    const value = reviewState(card);
    if (value === "weak") return "Need practice";
    if (value === "known") return "Familiar";
    return "Not reviewed";
  }

  function updateReviewControls(card) {
    const stateText = zenPage.querySelector(".zen-review-state");
    if (stateText) stateText.textContent = reviewStateLabel(card);
    zenPage.querySelectorAll(".zen-review-button").forEach((button) => {
      button.classList.toggle("is-active", button.dataset.review === reviewState(card));
    });
  }

  function setCardReview(card, value) {
    const id = cardId(card);
    if (value === "weak") {
      reviewStates.set(id, "weak");
      markedCards.add(id);
    } else if (value === "known") {
      reviewStates.set(id, "known");
      markedCards.delete(id);
    }
    saveReviewStates();
    saveBank();
    updateReviewControls(card);
  }

  function toggleMarked(card) {
    const id = cardId(card);
    if (markedCards.has(id)) {
      markedCards.delete(id);
      if (reviewStates.get(id) === "weak") {
        reviewStates.delete(id);
        saveReviewStates();
      }
    } else {
      markedCards.add(id);
    }
    saveBank();
    if (!bankPage.hidden) {
      renderBankPage();
    } else {
      renderStudyPage(state.topic);
    }
  }

  function markedCardList() {
    return allCards.filter((card) => markedCards.has(cardId(card)));
  }

  function cardsForTopic(topic) {
    return allCards.filter((card) => card.topic === topic);
  }

  function resetZenPosition() {
    state.zenIndex = 0;
    state.zenFlipped = false;
  }

  function enterZen(startIndex = 0) {
    const cards = currentCards();
    if (cards.length === 0) return;
    state.zenActive = true;
    state.zenIndex = Math.max(0, Math.min(startIndex, cards.length - 1));
    state.zenFlipped = false;
    saveZenProgress();
    renderStudyPage(state.topic);
  }

  function enterZenFromCard(card) {
    const cards = currentCards();
    const index = cards.findIndex((item) => cardId(item) === cardId(card));
    if (index < 0) return;
    enterZen(index);
  }

  function exitZen() {
    state.zenActive = false;
    saveZenProgress();
    resetZenPosition();
    renderStudyPage(state.topic);
  }

  function advanceZen() {
    const cards = currentCards();
    if (cards.length === 0) {
      exitZen();
      return;
    }
    if (!state.zenFlipped) {
      state.zenFlipped = true;
      const card = zenPage.querySelector(".zen-card");
      if (card) card.classList.add("is-flipped");
    } else {
      state.zenIndex = (state.zenIndex + 1) % cards.length;
      state.zenFlipped = false;
      saveZenProgress();
      renderZenPage(cards);
    }
  }

  function jumpZenTo(position) {
    const cards = currentCards();
    if (!state.zenActive || cards.length === 0) return;
    const nextIndex = Math.max(0, Math.min(Number(position) - 1, cards.length - 1));
    if (!Number.isFinite(nextIndex)) return;
    state.zenIndex = nextIndex;
    state.zenFlipped = false;
    saveZenProgress();
    renderZenPage(cards);
  }

  function continueZen() {
    const progress = loadZenProgress();
    if (!progress) return;
    state.query = progress.query || "";
    state.practiceMode = progress.practiceMode || "all";
    state.randomSalt = progress.randomSalt || String(Date.now());
    if (searchInput) searchInput.value = state.query;
    if (practiceModeSelect) practiceModeSelect.value = state.practiceMode;
    state.topic = progress.topic;
    state.zenActive = true;
    state.zenIndex = Number(progress.zenIndex) || 0;
    state.zenFlipped = false;
    if (routeFromHash() !== progress.topic) {
      window.location.hash = `topic/${encodeURIComponent(progress.topic)}`;
      return;
    }
    renderStudyPage(progress.topic);
  }

  function stableHash(value) {
    let hash = 0;
    for (let index = 0; index < value.length; index += 1) {
      hash = ((hash << 5) - hash + value.charCodeAt(index)) | 0;
    }
    return hash;
  }

  function moveZen(delta) {
    const cards = currentCards();
    if (!state.zenActive || cards.length === 0) return;
    state.zenIndex = (state.zenIndex + delta + cards.length) % cards.length;
    state.zenFlipped = false;
    saveZenProgress();
    renderZenPage(cards);
  }

  function navigateToTopic(topic) {
    window.location.hash = `topic/${encodeURIComponent(topic)}`;
  }

  function routeFromHash() {
    const hash = window.location.hash.replace(/^#/, "");
    if (hash === "bank") return "bank";
    if (!hash || hash === "topics") return null;
    const match = hash.match(/^topic\/(.+)$/);
    if (!match) return null;
    const topic = decodeURIComponent(match[1]);
    return topicOrder.includes(topic) ? topic : null;
  }

  function renderLanding() {
    document.body.classList.remove("is-study-mode", "is-bank-mode");
    state.topic = null;
    topicLanding.hidden = false;
    studyPage.hidden = true;
    bankPage.hidden = true;
    visibleCount.textContent = String(topicOrder.length);
    totalCount.textContent = String(topicOrder.length);
    setNeutralHeader();

    topicLanding.innerHTML = `
      <div class="landing-intro">
        <p class="eyebrow">Topic map</p>
        <h2>Pick the world you are about to enter.</h2>
      </div>
      <div class="topic-gallery"></div>
    `;

    const gallery = topicLanding.querySelector(".topic-gallery");
    topicOrder.forEach((topic, index) => {
      const meta = topicMeta[topic];
      const count = cardsForTopic(topic).length;
      const button = document.createElement("button");
      button.type = "button";
      button.className = "topic-tile";
      button.style.setProperty("--topic", meta.color);
      button.style.setProperty("--accent", meta.accent);
      button.style.setProperty("--delay", `${index * 22}ms`);
      button.setAttribute("aria-label", `Study ${meta.label}`);
      button.innerHTML = `
        <span class="tile-visual" aria-hidden="true">
          <span class="concept-plane plane-a"></span>
          <span class="concept-plane plane-b"></span>
          <span class="concept-line concept-line-a"></span>
          <span class="concept-line concept-line-b"></span>
          <span class="concept-tag tag-a">${escapeHtml(meta.imageWords[0])}</span>
          <span class="concept-tag tag-b">${escapeHtml(meta.imageWords[1])}</span>
          <span class="concept-tag tag-c">${escapeHtml(meta.imageWords[2])}</span>
        </span>
        <span class="tile-content">
          <span class="tile-kicker">${escapeHtml(meta.zh)}</span>
          <span class="tile-title">${escapeHtml(meta.label)}</span>
          <span class="tile-copy">${escapeHtml(meta.concept)}</span>
          <span class="tile-count">${count} cards</span>
        </span>
      `;
      button.addEventListener("click", () => navigateToTopic(topic));
      gallery.appendChild(button);
    });
  }

  function matches(card) {
    const query = state.query.trim().toLowerCase();
    if (card.topic !== state.topic) return false;
    if (!query) return true;
    const haystack = [
      card.baseChinese,
      card.baseEnglish,
      card.frontChinese,
      card.backEnglish,
      card.type,
      synonymSearchText(card)
    ].join(" ").toLowerCase();
    return haystack.includes(query);
  }

  function currentCards() {
    let cards = allCards.filter(matches);
    if (state.practiceMode === "banked") {
      cards = cards.filter((card) => markedCards.has(cardId(card)));
    }
    if (state.practiceMode === "weak") {
      cards = cards.filter((card) => reviewStates.get(cardId(card)) === "weak");
    }
    if (state.practiceMode === "random") {
      cards = [...cards].sort((a, b) => stableHash(`${state.randomSalt}:${cardId(a)}`) - stableHash(`${state.randomSalt}:${cardId(b)}`));
    }
    return cards;
  }

  function makeCard(card) {
    const meta = topicMeta[card.topic];
    const id = cardId(card);
    const isMarked = markedCards.has(id);
    const wrapper = document.createElement("article");
    wrapper.className = "flashcard-shell";
    wrapper.style.setProperty("--topic", meta.color);
    wrapper.innerHTML = `
      <div class="collocation-panel">
        <div class="card-tools">
          <span class="card-tool-label">${escapeHtml(card.type)}</span>
          <span class="card-tool-actions">
            <button class="zen-start-button" type="button" aria-label="Start zen mode from ${escapeHtml(card.frontChinese)}">Zen</button>
            <button class="mark-button${isMarked ? " is-marked" : ""}" type="button" aria-pressed="${isMarked}" aria-label="${isMarked ? "Remove from" : "Add to"} unfamiliar collocation bank">
              <span class="mark-icon" aria-hidden="true">${isMarked ? "!" : "+"}</span>
              <span>${isMarked ? "Banked" : "Mark"}</span>
            </button>
          </span>
        </div>
        <button class="flashcard" type="button" aria-label="${escapeHtml(card.frontChinese)}, flip card">
          <span class="card-inner">
            <span class="card-face card-front">
              <span class="card-type">${escapeHtml(card.type)}</span>
              <span class="card-text">${renderHighlighted(card.frontChinese, card.highlightChinese)}</span>
              <span class="card-meta">Chinese front</span>
            </span>
            <span class="card-face card-back">
              <span class="card-type">${escapeHtml(card.topic)}</span>
              <span class="card-text">${renderHighlighted(card.backEnglish, card.highlightEnglish)}</span>
              <span class="card-meta">English back</span>
            </span>
          </span>
        </button>
      </div>
    `;
    const button = wrapper.querySelector(".flashcard");
    const markButton = wrapper.querySelector(".mark-button");
    const zenStartButton = wrapper.querySelector(".zen-start-button");
    button.addEventListener("click", () => button.classList.toggle("is-flipped"));
    button.addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        button.classList.toggle("is-flipped");
      }
    });
    zenStartButton.addEventListener("click", (event) => {
      event.preventDefault();
      event.stopPropagation();
      enterZenFromCard(card);
    });
    markButton.addEventListener("click", (event) => {
      event.preventDefault();
      event.stopPropagation();
      toggleMarked(card);
    });
    return wrapper;
  }

  function sortedMarkedCards() {
    return markedCardList().sort((a, b) => {
      if (a.topic === b.topic) return cardId(a).localeCompare(cardId(b));
      return topicOrder.indexOf(a.topic) - topicOrder.indexOf(b.topic);
    });
  }

  function renderBankEntry() {
    const count = markedCards.size;
    collocationBank.hidden = false;
    collocationBank.className = "collocation-bank is-compact";
    collocationBank.innerHTML = `
      <div class="bank-compact-copy">
        <strong>Bank</strong>
        <span>${count} saved</span>
      </div>
      <button class="bank-open compact-open" type="button" aria-label="Open collocation bank">${iconSvg("open")}<span>Open</span></button>
    `;
    collocationBank.querySelector(".bank-open").addEventListener("click", () => {
      window.location.hash = "bank";
    });
  }

  function renderBankPage() {
    document.body.classList.remove("is-study-mode");
    document.body.classList.add("is-bank-mode");
    const cards = sortedMarkedCards();
    topicLanding.hidden = true;
    studyPage.hidden = true;
    bankPage.hidden = false;
    visibleCount.textContent = String(cards.length);
    totalCount.textContent = String(allCards.length);
    setNeutralHeader("Review the collocations you marked as unfamiliar.");
    bankPage.innerHTML = `
      <div class="bank-page-header">
        <div>
          <p class="eyebrow">Collocation bank</p>
          <h2>Unfamiliar collocations</h2>
        </div>
        <div class="bank-page-actions">
          <span class="bank-count">${cards.length} saved</span>
          <button id="bankBackButton" type="button">Back to study</button>
        </div>
      </div>
      <div class="bank-page-grid"></div>
    `;
    bankPage.querySelector("#bankBackButton").addEventListener("click", () => {
      navigateToTopic(state.lastTopic || "Technology");
    });

    const grid = bankPage.querySelector(".bank-page-grid");
    if (cards.length === 0) {
      grid.innerHTML = '<div class="empty-state">No marked collocations yet.</div>';
      return;
    }

    cards.forEach((card) => {
      const meta = topicMeta[card.topic];
      const item = document.createElement("article");
      item.className = "bank-item";
      item.style.setProperty("--topic", meta.color);
      item.innerHTML = `
        <div class="bank-copy">
          <span class="bank-topic">${escapeHtml(card.topic)} · ${escapeHtml(card.type)}</span>
          <strong>${renderHighlighted(card.frontChinese, card.highlightChinese)}</strong>
          <span>${renderHighlighted(card.backEnglish, card.highlightEnglish)}</span>
        </div>
        <button class="bank-remove" type="button" aria-label="Remove ${escapeHtml(card.frontChinese)} from bank">Remove</button>
      `;
      item.querySelector(".bank-remove").addEventListener("click", () => toggleMarked(card));
      grid.appendChild(item);
    });
  }

  function renderFilters() {
    filtersEl.innerHTML = "";
    topicOrder.forEach((topic) => {
      const meta = topicMeta[topic];
      const button = document.createElement("button");
      button.type = "button";
      button.className = "topic-filter";
      button.textContent = meta.label;
      button.style.setProperty("--topic", meta.color);
      button.classList.toggle("is-active", state.topic === topic);
      button.addEventListener("click", () => navigateToTopic(topic));
      filtersEl.appendChild(button);
    });
  }

  function renderZenPage(cards) {
    if (!state.zenActive) {
      zenPage.hidden = true;
      zenPage.innerHTML = "";
      return;
    }

    if (cards.length === 0) {
      state.zenActive = false;
      zenPage.hidden = true;
      zenPage.innerHTML = "";
      return;
    }

    if (state.zenIndex >= cards.length) state.zenIndex = 0;
    const card = cards[state.zenIndex];
    const meta = topicMeta[card.topic];
    zenPage.hidden = false;
    zenPage.style.setProperty("--topic", meta.color);
    zenPage.innerHTML = `
      <div class="zen-topbar">
        <div>
          <p class="topic-label">${escapeHtml(meta.zh)} / ${escapeHtml(card.type)}</p>
          <h2>Zen mode</h2>
        </div>
        <div class="zen-actions">
          <span class="zen-count">${state.zenIndex + 1} / ${cards.length}</span>
          <label class="zen-jump-control">
            <span>Jump</span>
            <input class="zen-jump-input" type="number" min="1" max="${cards.length}" value="${state.zenIndex + 1}">
          </label>
          <button class="zen-jump-button" type="button">Go</button>
          <button id="zenExitButton" type="button">Exit zen</button>
        </div>
      </div>
      <div class="zen-stage">
        <button class="zen-card${state.zenFlipped ? " is-flipped" : ""}" type="button" aria-label="${escapeHtml(card.frontChinese)}, zen flip card">
          <span class="zen-inner">
            <span class="zen-face zen-front">
              <span class="card-type">Chinese front</span>
              <span class="zen-text">${renderHighlighted(card.frontChinese, card.highlightChinese)}</span>
              <span class="card-meta">Space: flip · ← previous · → next</span>
            </span>
            <span class="zen-face zen-back">
              <span class="card-type">English back</span>
              <span class="zen-text">${renderHighlighted(card.backEnglish, card.highlightEnglish)}</span>
              <span class="card-meta">Space: next card · ← previous · → next</span>
            </span>
          </span>
        </button>
        ${renderZenSynonymPanel(card)}
      </div>
      <div class="zen-review" aria-label="Zen review controls">
        <span class="zen-review-state">${escapeHtml(reviewStateLabel(card))}</span>
        <button class="zen-review-button" data-review="known" type="button">Familiar</button>
        <button class="zen-review-button" data-review="weak" type="button">Not familiar</button>
      </div>
    `;

    zenPage.querySelector("#zenExitButton").addEventListener("click", exitZen);
    zenPage.querySelector(".zen-jump-button").addEventListener("click", () => {
      jumpZenTo(zenPage.querySelector(".zen-jump-input").value);
    });
    zenPage.querySelector(".zen-jump-input").addEventListener("keydown", (event) => {
      if (event.key !== "Enter") return;
      event.preventDefault();
      jumpZenTo(event.target.value);
    });
    zenPage.querySelectorAll(".zen-review-button").forEach((button) => {
      button.addEventListener("click", () => setCardReview(card, button.dataset.review));
    });
    zenPage.querySelector(".zen-card").addEventListener("click", advanceZen);
    updateReviewControls(card);
    saveZenProgress();
  }

  function renderStudyPage(topic) {
    document.body.classList.add("is-study-mode");
    document.body.classList.remove("is-bank-mode");
    if (state.topic && state.topic !== topic) {
      state.zenActive = false;
      resetZenPosition();
    }
    state.topic = topic;
    state.lastTopic = topic;
    topicLanding.hidden = true;
    studyPage.hidden = false;
    bankPage.hidden = true;
    studyPage.classList.toggle("is-zen", state.zenActive);
    renderFilters();
    renderBankEntry();
    updateContinueZenButton();
    if (practiceModeSelect) practiceModeSelect.value = state.practiceMode;

    const meta = topicMeta[topic];
    setTopicHeader(topic);
    bankButton.style.setProperty("--topic", meta.color);
    zenButton.style.setProperty("--topic", meta.color);
    const topicTotal = cardsForTopic(topic).length;
    const filtered = currentCards();
    visibleCount.textContent = String(filtered.length);
    totalCount.textContent = String(topicTotal);
    sectionsEl.innerHTML = "";
    renderZenPage(filtered);

    if (filtered.length === 0) {
      sectionsEl.innerHTML = '<div class="empty-state">No cards match the current search.</div>';
      return;
    }

    const section = document.createElement("section");
    section.className = "topic-section";
    section.style.setProperty("--topic", meta.color);
    section.innerHTML = `
      <div class="card-grid"></div>
    `;

    const grid = section.querySelector(".card-grid");
    filtered.forEach((card) => grid.appendChild(makeCard(card)));
    sectionsEl.appendChild(section);
  }

  function renderRoute() {
    const topic = routeFromHash();
    if (topic === "bank") {
      state.zenActive = false;
      resetZenPosition();
      renderBankPage();
      return;
    }
    if (!topic) {
      state.query = "";
      state.zenActive = false;
      resetZenPosition();
      if (searchInput) searchInput.value = "";
      renderLanding();
      return;
    }
    renderStudyPage(topic);
  }

  searchInput.addEventListener("input", (event) => {
    state.query = event.target.value;
    resetZenPosition();
    renderStudyPage(state.topic);
  });

  practiceModeSelect.addEventListener("change", (event) => {
    state.practiceMode = event.target.value;
    if (state.practiceMode === "random") state.randomSalt = String(Date.now());
    resetZenPosition();
    renderStudyPage(state.topic);
  });

  resetButton.addEventListener("click", () => {
    document.querySelectorAll(".flashcard.is-flipped").forEach((card) => {
      card.classList.remove("is-flipped");
    });
  });

  bankButton.addEventListener("click", () => {
    state.zenActive = false;
    resetZenPosition();
    window.location.hash = "bank";
  });

  zenButton.addEventListener("click", () => enterZen());
  continueZenButton.addEventListener("click", continueZen);

  document.addEventListener("keydown", (event) => {
    if (!state.zenActive) return;
    if (event.code === "Space") {
      event.preventDefault();
      advanceZen();
      return;
    }
    if (event.code === "ArrowRight") {
      event.preventDefault();
      moveZen(1);
      return;
    }
    if (event.code === "ArrowLeft") {
      event.preventDefault();
      moveZen(-1);
    }
  });

  backButton.addEventListener("click", () => {
    state.zenActive = false;
    resetZenPosition();
    window.location.hash = "topics";
  });

  window.addEventListener("hashchange", renderRoute);
  setupActionButtons();
  renderRoute();
})();

</script>
</body>
</html>

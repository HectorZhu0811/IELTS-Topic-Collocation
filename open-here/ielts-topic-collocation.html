<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IELTS Task 2 Collocation Trainer</title>
  <style>
:root {
  --bg: #f5f5f7;
  --ink: #202124;
  --muted: #6e6e73;
  --panel: #ffffff;
  --line: #d9d9df;
  --shadow: 0 18px 46px rgba(0, 0, 0, 0.08);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  background: var(--bg);
  color: var(--ink);
  font-family: Inter, "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans SC", sans-serif;
}

.app-header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 24px;
  padding: 42px clamp(20px, 5vw, 72px) 28px;
  border-bottom: 0;
  background: rgba(245, 245, 247, 0.86);
  backdrop-filter: blur(18px);
}

.is-study-mode .app-header {
  display: none;
}

.is-study-mode .app-header h1 {
  font-size: clamp(28px, 3vw, 38px);
}

.is-study-mode .eyebrow,
.is-study-mode .page-subtitle {
  color: rgba(255, 255, 255, 0.82);
}

.is-study-mode .eyebrow {
  display: none;
}

.is-study-mode .page-subtitle {
  display: none;
  max-width: min(760px, 58vw);
  margin-top: 8px;
  font-size: 15px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.is-study-mode .stats {
  min-width: 92px;
  padding: 8px 12px;
  border-color: rgba(255, 255, 255, 0.32);
  background: rgba(255, 255, 255, 0.14);
  color: #fff;
}

.is-study-mode .study-nav {
  display: none;
}

.eyebrow {
  margin: 0 0 8px;
  color: var(--muted);
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

h1 {
  margin: 0;
  font-size: clamp(36px, 5vw, 66px);
  line-height: 1;
  letter-spacing: 0;
}

.header-topic-button {
  display: inline-flex;
  align-items: center;
  max-width: min(78vw, 760px);
  margin: -4px -8px;
  padding: 4px 8px;
  border: 1px solid transparent;
  border-radius: 8px;
  background: transparent;
  color: inherit;
  font: inherit;
  line-height: inherit;
  letter-spacing: inherit;
  text-align: left;
  cursor: pointer;
}

.header-topic-button span {
  display: block;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.header-topic-button:hover,
.header-topic-button:focus-visible {
  background: rgba(20, 20, 24, 0.06);
  outline: none;
}

.is-study-mode .header-topic-button {
  margin: -5px -10px;
  padding: 5px 10px;
  border-color: rgba(255, 255, 255, 0.3);
  background: rgba(255, 255, 255, 0.12);
}

.is-study-mode .header-topic-button:hover,
.is-study-mode .header-topic-button:focus-visible {
  background: rgba(255, 255, 255, 0.2);
  box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.16);
}

.page-subtitle {
  max-width: 760px;
  margin: 14px 0 0;
  color: var(--muted);
  font-size: clamp(15px, 2vw, 18px);
  line-height: 1.5;
}

.stats {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  min-width: 104px;
  padding: 12px 16px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
  color: var(--muted);
  font-weight: 900;
  justify-content: center;
}

main {
  padding: 30px clamp(16px, 4vw, 56px) 58px;
}

.is-study-mode main {
  padding-top: clamp(20px, 3vw, 34px);
}

.is-landing-mode .app-header {
  display: none;
}

.is-landing-mode main,
.is-bank-mode main {
  width: min(1240px, calc(100vw - 32px));
  margin: 0 auto;
  padding: 18px 0 24px;
}

.is-bank-mode .app-header {
  display: none;
}

.topic-landing {
  display: grid;
  gap: 22px;
}

.landing-intro {
  max-width: 900px;
}

.landing-intro h2 {
  margin: 0;
  max-width: 820px;
  font-size: clamp(28px, 4vw, 52px);
  line-height: 1.04;
  letter-spacing: 0;
}

.store-hero {
  display: grid;
  grid-template-columns: minmax(0, 1.4fr) minmax(280px, 0.6fr);
  gap: 22px;
  align-items: stretch;
}

.store-hero-copy,
.store-feature,
.dashboard-strip article {
  border-radius: 22px;
  background: #fff;
  box-shadow: 0 18px 42px rgba(0, 0, 0, 0.06);
}

.store-hero-copy {
  display: grid;
  align-content: center;
  gap: 18px;
  min-height: 360px;
  padding: clamp(28px, 5vw, 64px);
}

.store-hero-copy h2 {
  max-width: 780px;
  margin: 0;
  font-size: clamp(38px, 6vw, 74px);
  line-height: 0.98;
  letter-spacing: 0;
}

.store-hero-copy p:not(.eyebrow) {
  max-width: 680px;
  margin: 0;
  color: var(--muted);
  font-size: clamp(16px, 2vw, 21px);
  line-height: 1.45;
}

.store-actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.store-primary,
.store-secondary,
.store-link-button {
  border-radius: 999px;
  padding: 0 20px;
}

.store-primary {
  border-color: #0071e3;
  background: #0071e3;
  color: #fff;
}

.store-primary:hover,
.store-primary:focus-visible {
  border-color: #0071e3;
  color: #fff;
  box-shadow: 0 14px 28px rgba(0, 113, 227, 0.22);
}

.store-secondary,
.store-link-button {
  border-color: transparent;
  background: #f5f5f7;
  color: #1d1d1f;
}

.store-feature {
  --topic: #2563eb;
  --accent: #38bdf8;
  display: grid;
  align-content: end;
  gap: 8px;
  min-height: 360px;
  padding: 28px;
  color: #fff;
  background:
    radial-gradient(circle at 24% 18%, color-mix(in srgb, var(--accent), #fff 18%), transparent 34%),
    linear-gradient(145deg, color-mix(in srgb, var(--topic), #111 8%), color-mix(in srgb, var(--accent), #111 18%));
  overflow: hidden;
  text-align: left;
  transition: transform 220ms ease, box-shadow 220ms ease, filter 220ms ease;
}

.store-feature:hover,
.store-feature:focus-visible {
  color: #fff;
  transform: translateY(-3px);
  box-shadow: 0 24px 54px color-mix(in srgb, var(--topic), transparent 74%);
  filter: saturate(1.04);
  outline: 0;
}

.store-feature:active {
  transform: translateY(-1px) scale(0.992);
}

.store-feature-kicker {
  font-size: 13px;
  font-weight: 850;
  opacity: 0.82;
}

.store-feature strong {
  font-size: clamp(36px, 5vw, 62px);
  line-height: 1;
}

.store-feature span:last-child {
  font-weight: 850;
  opacity: 0.86;
}

.dashboard-strip {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 14px;
}

.dashboard-strip article {
  display: grid;
  gap: 8px;
  min-height: 124px;
  padding: 22px;
}

.dashboard-strip span {
  color: var(--muted);
  font-size: 13px;
  font-weight: 850;
}

.dashboard-strip strong {
  font-size: clamp(34px, 5vw, 54px);
  line-height: 1;
}

.store-section-heading {
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 16px;
}

.store-section-heading h3 {
  margin: 0;
  font-size: clamp(28px, 4vw, 44px);
  line-height: 1;
}

.topic-gallery {
  display: grid;
  grid-template-columns: repeat(5, minmax(160px, 1fr));
  gap: 14px;
}

.topic-tile {
  --topic: #2563eb;
  --accent: #38bdf8;
  position: relative;
  display: grid;
  grid-template-rows: 156px 1fr;
  min-height: 352px;
  height: auto;
  padding: 0;
  border: 1px solid color-mix(in srgb, var(--topic), #ffffff 66%);
  border-radius: 8px;
  overflow: hidden;
  background: var(--panel);
  color: var(--ink);
  text-align: left;
  box-shadow: 0 12px 28px rgba(37, 31, 22, 0.08);
  cursor: pointer;
  animation: tile-in 420ms ease both;
  animation-delay: var(--delay);
}

.topic-tile:hover,
.topic-tile:focus-visible {
  transform: translateY(-3px);
  border-color: var(--topic);
  box-shadow: var(--shadow);
  outline: 0;
}

.tile-visual {
  position: relative;
  display: block;
  min-height: 156px;
  background:
    linear-gradient(135deg, color-mix(in srgb, var(--topic), #111 18%), color-mix(in srgb, var(--accent), #fff 18%));
  overflow: hidden;
}

.concept-plane,
.concept-line,
.concept-tag {
  position: absolute;
  display: block;
}

.concept-plane {
  border: 1px solid rgba(255, 255, 255, 0.48);
  background: rgba(255, 255, 255, 0.14);
  transform: skewX(-12deg);
}

.plane-a {
  width: 66%;
  height: 62px;
  left: -8%;
  top: 24px;
}

.plane-b {
  width: 58%;
  height: 46px;
  right: -9%;
  bottom: 24px;
}

.concept-line {
  height: 2px;
  background: rgba(255, 255, 255, 0.74);
  transform-origin: left center;
}

.concept-line-a {
  width: 78%;
  left: 18px;
  top: 36px;
  transform: rotate(-10deg);
}

.concept-line-b {
  width: 62%;
  right: 18px;
  bottom: 44px;
  transform: rotate(-10deg);
}

.concept-tag {
  max-width: 90px;
  padding: 6px 8px;
  border: 1px solid rgba(255, 255, 255, 0.46);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.18);
  color: #fff;
  font-size: 11px;
  font-weight: 900;
  text-transform: uppercase;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.tag-a {
  left: 18px;
  bottom: 18px;
}

.tag-b {
  right: 16px;
  top: 18px;
}

.tag-c {
  left: 50%;
  top: 72px;
  transform: translateX(-50%);
}

.tile-content {
  display: grid;
  grid-template-rows: auto auto 1fr auto;
  gap: 8px;
  min-height: 196px;
  padding: 18px;
}

.tile-kicker {
  color: var(--topic);
  font-size: 13px;
  font-weight: 900;
}

.tile-title {
  font-size: 24px;
  font-weight: 950;
  line-height: 1.1;
}

.tile-copy {
  color: var(--muted);
  font-size: 14px;
  line-height: 1.42;
}

.tile-count {
  justify-self: start;
  padding: 7px 10px;
  border-left: 6px solid var(--topic);
  background: color-mix(in srgb, var(--topic), #fff 91%);
  color: color-mix(in srgb, var(--topic), #111 24%);
  font-size: 12px;
  font-weight: 900;
}

.topic-gallery {
  gap: 18px;
}

.topic-tile {
  grid-template-rows: 132px 1fr;
  min-height: 330px;
  border-color: rgba(0, 0, 0, 0.04);
  border-radius: 22px;
  box-shadow: 0 12px 28px rgba(0, 0, 0, 0.06);
}

.topic-tile:hover,
.topic-tile:focus-visible {
  transform: translateY(-4px);
}

.tile-visual {
  min-height: 132px;
}

.tile-content {
  min-height: 198px;
  padding: 20px;
}

.tile-title {
  font-size: 26px;
}

.tile-metrics {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  align-self: end;
}

.tile-metrics span {
  padding: 6px 8px;
  border-radius: 999px;
  background: #f5f5f7;
  color: #4b4b50;
  font-size: 11px;
  font-weight: 850;
}

.topic-gallery {
  grid-template-columns: none;
  grid-auto-flow: column;
  grid-auto-columns: clamp(280px, 28vw, 380px);
  gap: 16px;
  overflow-x: auto;
  overflow-y: hidden;
  padding: 2px 2px 16px;
  scroll-snap-type: x proximity;
  scrollbar-width: thin;
  scrollbar-color: rgba(29, 29, 31, 0.18) transparent;
}

.topic-gallery::-webkit-scrollbar {
  height: 8px;
}

.topic-gallery::-webkit-scrollbar-track {
  background: transparent;
}

.topic-gallery::-webkit-scrollbar-thumb {
  border-radius: 999px;
  background: rgba(29, 29, 31, 0.18);
}

.topic-tile {
  grid-template-rows: 1fr;
  min-height: 238px;
  padding: 24px;
  border: 0;
  border-radius: 22px;
  background:
    radial-gradient(circle at 84% 14%, color-mix(in srgb, var(--accent), #fff 46%), transparent 38%),
    linear-gradient(155deg, #fff 0%, color-mix(in srgb, var(--topic), #fff 91%) 100%);
  box-shadow: 0 16px 38px rgba(0, 0, 0, 0.055);
  animation: none;
  scroll-snap-align: start;
}

.topic-tile:hover,
.topic-tile:focus-visible {
  transform: translateY(-4px);
  box-shadow: 0 22px 48px rgba(0, 0, 0, 0.075);
}

.tile-visual,
.tile-copy,
.tile-metrics {
  display: none;
}

.tile-content {
  grid-template-rows: auto 1fr;
  gap: 18px;
  min-height: 100%;
  padding: 0;
}

.tile-kicker {
  font-size: 13px;
  font-weight: 950;
}

.tile-title {
  align-self: center;
  max-width: 100%;
  font-size: clamp(34px, 4vw, 52px);
  line-height: 1;
  letter-spacing: 0;
  overflow-wrap: anywhere;
}

.topic-reel-hero {
  display: grid;
  grid-template-columns: minmax(220px, 0.42fr) minmax(560px, 1.58fr);
  gap: 18px;
  align-items: stretch;
}

.topic-reel-hero .topic-quick-stack,
.topic-reel-hero .topic-reel-window {
  min-height: 510px;
  border-radius: 22px;
  background: #fff;
  box-shadow: 0 18px 42px rgba(0, 0, 0, 0.06);
}

.topic-reel-hero .topic-quick-stack {
  display: grid;
  grid-template-rows: minmax(0, 1fr);
  gap: 14px;
  background: transparent;
  box-shadow: none;
}

.topic-reel-hero .topic-quick-card {
  display: grid;
  align-content: center;
  gap: 10px;
  height: auto;
  padding: clamp(24px, 3vw, 42px);
  border: 0;
  border-radius: 22px;
  box-shadow: 0 18px 42px rgba(0, 0, 0, 0.06);
  color: var(--ink);
  line-height: 0.98;
  letter-spacing: 0;
  text-align: left;
}

.topic-reel-hero .topic-memory-card {
  background:
    radial-gradient(circle at 82% 16%, rgba(0, 113, 227, 0.14), transparent 34%),
    linear-gradient(155deg, #fff, #f5f8ff);
}

.topic-reel-hero .topic-recent-card {
  background:
    radial-gradient(circle at 80% 20%, rgba(124, 58, 237, 0.14), transparent 34%),
    linear-gradient(155deg, #fff, #f8f5ff);
}

.topic-reel-hero .topic-quick-card span,
.topic-reel-hero .topic-quick-card em {
  color: var(--muted);
  font-size: 12px;
  font-weight: 950;
  font-style: normal;
  text-transform: uppercase;
}

.topic-reel-hero .topic-quick-card strong {
  max-width: 100%;
  font-size: clamp(30px, 2.7vw, 42px);
  font-weight: 950;
  line-height: 0.98;
  overflow-wrap: normal;
  word-break: normal;
}

.topic-reel-hero .topic-quick-card:hover,
.topic-reel-hero .topic-quick-card:focus-visible {
  outline: 0;
  transform: translateY(-3px);
  box-shadow: 0 24px 58px rgba(0, 0, 0, 0.08);
}

.topic-reel-hero .topic-reel-copy {
  display: grid;
  align-content: center;
  gap: 14px;
  min-height: 360px;
  max-width: none;
  padding: clamp(28px, 4vw, 52px);
}

.topic-reel-copy h2,
.topic-reel-copy h4 {
  margin: 0;
  font-size: clamp(40px, 5vw, 68px);
  line-height: 0.92;
  letter-spacing: 0;
}

.topic-reel-hero .topic-reel-window {
  align-content: center;
  max-height: none;
  padding: 18px;
}

.topic-reel-hero .topic-reel-card {
  min-height: 74px;
  padding: 14px 24px;
}

.topic-reel-hero .topic-reel-card.is-active {
  grid-template-columns: minmax(0, 1fr) auto;
  align-items: center;
  align-content: center;
  gap: 20px;
  min-height: 126px;
}

.topic-reel-hero .topic-reel-card strong {
  margin-top: 5px;
  font-size: clamp(32px, 4vw, 52px);
}

.topic-reel-hero .topic-reel-meta {
  margin-top: 6px;
}

.topic-reel-picker {
  display: grid;
  grid-template-columns: minmax(320px, 0.72fr) minmax(0, 1fr);
  gap: 34px;
  align-items: center;
  min-height: 620px;
  padding: 24px;
  border-radius: 28px;
  background:
    linear-gradient(180deg, #f8f8fa, #fff),
    radial-gradient(circle at 78% 24%, rgba(250, 204, 21, 0.16), transparent 34%);
}

.topic-reel-copy {
  display: grid;
  gap: 18px;
  align-content: center;
  max-width: 620px;
}

.topic-reel-copy p:not(.eyebrow) {
  margin: 0;
  color: var(--muted);
  font-size: 16px;
  line-height: 1.35;
  font-weight: 850;
}

.topic-reel-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.topic-reel-window {
  position: relative;
  display: grid;
  max-height: none;
  padding: 18px;
  border-radius: 22px;
  background: #fff;
  box-shadow: 0 18px 42px rgba(0, 0, 0, 0.06);
  overflow: hidden;
}

.topic-reel-window::before,
.topic-reel-window::after {
  position: absolute;
  right: 0;
  left: 0;
  z-index: 4;
  height: 82px;
  content: "";
  pointer-events: none;
}

.topic-reel-window::before {
  top: 0;
  background: linear-gradient(180deg, #fff, transparent);
}

.topic-reel-window::after {
  bottom: 0;
  background: linear-gradient(0deg, #fff, transparent);
}

.topic-reel-list {
  display: grid;
  gap: 10px;
  transform: translate3d(0, 0, 0);
  backface-visibility: hidden;
  will-change: transform;
}

.topic-reel-card {
  --topic: #2563eb;
  --accent: #38bdf8;
  --reel-opacity: 0.28;
  display: grid;
  align-content: center;
  min-height: 74px;
  height: auto;
  padding: 14px 24px;
  border: 0;
  border-radius: 18px;
  background:
    radial-gradient(circle at 84% 20%, color-mix(in srgb, var(--accent), #fff 44%), transparent 40%),
    color-mix(in srgb, var(--topic), #fff 91%);
  color: var(--ink);
  text-align: left;
  opacity: var(--reel-opacity);
  transform: none;
  transition:
    opacity 260ms ease,
    transform 320ms cubic-bezier(0.2, 0.72, 0.18, 1),
    box-shadow 320ms ease;
}

.topic-reel-card:hover,
.topic-reel-card:focus-visible {
  opacity: 0.82;
  outline: 0;
  transform: translateY(-1px);
}

.topic-reel-card.is-active {
  position: relative;
  z-index: 2;
  --reel-opacity: 1;
  grid-template-columns: minmax(0, 1fr) auto;
  align-items: center;
  align-content: center;
  gap: 20px;
  min-height: 126px;
  opacity: 1;
  box-shadow: 0 22px 54px color-mix(in srgb, var(--topic), transparent 84%);
}

.topic-reel-card.is-active:hover,
.topic-reel-card.is-active:focus-visible {
  transform: translateY(-2px) scale(1);
}

.topic-reel-card.is-far {
  --reel-opacity: 0.18;
}

.topic-reel-window.is-morphing .topic-reel-list {
  pointer-events: none;
}

.topic-reel-card.is-morph-card {
  transform-origin: top left;
  transform:
    translate3d(var(--morph-x, 0), var(--morph-y, 0), 0)
    scale(var(--morph-scale-x, 1), var(--morph-scale-y, 1));
  transition: none;
  will-change: transform, opacity, box-shadow;
}

.topic-reel-card.is-morph-new {
  opacity: 0;
  transform: translate3d(0, 18px, 0) scale(0.96);
  transition: none;
  will-change: transform, opacity;
}

.topic-reel-card.is-morph-card.is-morph-playing,
.topic-reel-card.is-morph-new.is-morph-playing {
  opacity: var(--reel-opacity);
  transform: translate3d(0, 0, 0) scale(1);
  transition:
    transform 360ms cubic-bezier(0.16, 0.9, 0.18, 1),
    opacity 240ms ease,
    box-shadow 360ms ease;
}

.topic-reel-kicker,
.topic-reel-meta {
  display: block;
  color: color-mix(in srgb, var(--topic), #111 30%);
  font-size: 12px;
  font-weight: 900;
}

.topic-reel-card strong {
  display: block;
  margin-top: 5px;
  color: color-mix(in srgb, var(--topic), #111 12%);
  font-size: clamp(32px, 4vw, 52px);
  line-height: 1;
  letter-spacing: 0;
}

.subtopic-reel-card strong {
  font-size: clamp(22px, 2.7vw, 38px);
  line-height: 1.05;
}

.subtopic-phrase-preview {
  display: block;
  margin-top: 8px;
  color: color-mix(in srgb, var(--topic), #111 30%);
  font-size: 13px;
  font-weight: 850;
  line-height: 1.25;
}

.recent-topic-page {

button[data-tooltip] {
  position: relative;
}

button[data-tooltip]::before,
button[data-tooltip]::after {
  position: absolute;
  left: 50%;
  z-index: 30;
  opacity: 0;
  pointer-events: none;
  transform: translate(-50%, 6px);
  transition: opacity 160ms ease, transform 160ms ease;
}

button[data-tooltip]::before {
  content: attr(data-tooltip);
  bottom: calc(100% + 10px);
  max-width: 220px;
  padding: 8px 10px;
  border-radius: 10px;
  background: rgba(29, 29, 31, 0.92);
  color: #fff;
  font-size: 12px;
  font-weight: 850;
  line-height: 1.2;
  text-align: center;
  white-space: nowrap;
  box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
}

button[data-tooltip]::after {
  content: "";
  bottom: calc(100% + 4px);
  border: 6px solid transparent;
  border-top-color: rgba(29, 29, 31, 0.92);
}

button[data-tooltip]:hover::before,
button[data-tooltip]:hover::after,
button[data-tooltip]:focus-visible::before,
button[data-tooltip]:focus-visible::after {
  opacity: 1;
  transform: translate(-50%, 0);
}

  transform-style: preserve-3d;
  will-change: transform;

.zen-face {

  background: var(--panel);

(function reviewSentenceBank() {
  const bank = window.SENTENCE_BANK || {};
  const contextMap = {
    Technology: ["technology use", "education", "workplace", "public health"],
    Education: ["education", "technology use", "family life", "workplace"],
    Environment: ["environment", "government policy", "urban life", "public health"],
    Government: ["government policy", "urban life", "public health", "personal finance"],
    Society: ["family life", "urban life", "workplace", "government policy"],
    Health: ["public health", "family life", "technology use", "workplace"],
    Urbanization: ["urban life", "government policy", "environment", "personal finance"],
    Media: ["media influence", "technology use", "family life", "government policy"],
    Economy: ["personal finance", "workplace", "government policy", "urban life"],
    Arts: ["media influence", "education", "family life", "urban life"]
  };
  const scenes = {
    education: "students preparing for exams in a rural school",
    environment: "city councils reducing transport emissions",
    workplace: "employees adapting to new software at work",
    "government policy": "officials explaining a new regulation to taxpayers",
    "family life": "parents setting rules for teenagers at home",
    "technology use": "users managing privacy settings on social media",
    "public health": "local clinics warning elderly residents about health risks",
    "urban life": "commuters using crowded bus stations during rush hour",
    "media influence": "readers checking claims before sharing news online",
    "personal finance": "young adults comparing loans before borrowing money"
  };
  const genericPatterns = [
    /\bin modern society\b/i,
    /\bnowadays\b/i,
    /\bplays? an? important role\b/i,
    /\bis very important\b/i,
    /\bcan help people\b/i,
    /\bhas many benefits\b/i,
    /\bmake our life better\b/i
  ];
  const report = {
    reviewedSentences: 0,
    rewrittenSentences: 0,
    issueCounts: {}
  };

  function note(issue) {
    report.issueCounts[issue] = (report.issueCounts[issue] || 0) + 1;
  }

  function chooseContext(topic, text) {
    const pool = contextMap[topic] || ["education"];
    const seed = Array.from(String(text || topic)).reduce((sum, char) => sum + char.charCodeAt(0), 0);
    return pool[seed % pool.length];
  }

  function hasContext(sentence, context) {
    const lower = String(sentence || "").toLowerCase();
    return lower.includes(`in ${context}`) || lower.includes(scenes[context].split(" ").slice(0, 3).join(" ").toLowerCase());
  }

  function review(sentence, context) {
    const issues = [];
    if (!sentence) issues.push("missing-sentence");
    if (!hasContext(sentence, context)) issues.push("missing-micro-context");
    if (genericPatterns.some((pattern) => pattern.test(sentence))) issues.push("generic-template");
    return issues;
  }

  function expressionFromKey(key) {
    return String(key || "").split("::").pop() || "this expression";
  }

  function rewriteSentence(key, topic, level, context) {
    const expression = expressionFromKey(key);
    const isVerb = key.includes("::verb::");
    const subject = isVerb ? `efforts to ${expression}` : expression;
    const detail = level === "advanced"
      ? "create a clearer argument with a specific cause, audience, and result"
      : "give the sentence a clear situation instead of a vague general claim";
    return `In ${context}, ${subject} can help ${scenes[context]} ${detail}.`;
  }

  Object.entries(bank).forEach(([key, levels]) => {
    const topic = key.split("::")[0];
    Object.entries(levels || {}).forEach(([level, item]) => {
      if (!item || typeof item.en !== "string") return;
      report.reviewedSentences += 1;
      const context = item.microContext || chooseContext(topic, `${key}-${level}-${item.en}`);
      const issues = review(item.en, context);
      item.microContext = context;
      item.selfReview = {
        passed: issues.length === 0,
        issues
      };
      if (issues.length > 0) {
        issues.forEach(note);
        item.originalEn = item.en;
        item.en = rewriteSentence(key, topic, level, context);
        item.selfReview.rewritten = true;
        report.rewrittenSentences += 1;
      }
    });
  });

  window.SENTENCE_GENERATION_REVIEW = report;
})();

function normalizeSynonymKey(value) {
  return String(value || "")
    .toLowerCase()
    .replace(/\s*\/\s*.*/, "")
    .replace(/^highly\s+/, "")
    .trim();
}

function normalizeBaseKey(card) {
  return normalizeSynonymKey(card.baseEnglish)
    .replace(/^(a|an|the)\s+/, "")
    .replace(/\s+/g, " ");
}

function collocationProfile(card) {
  const text = `${card.baseEnglish} ${card.backEnglish}`.toLowerCase();
  if (/\b(crime|violence|delinquency|discrimination|inequality|poverty|pressure|cyberbullying|bullying|misinformation|breach|overload|screen time|pollution|disease|obesity|diabetes|depression|anxiety|blood pressure|mental health|shortage|addiction|homelessness|exclusion)\b/.test(text)) {
    return "problem";
  }
  if (/\b(system|school|policy|government|law|regulation|welfare|education|health care|infrastructure|organization|curriculum|assessment)\b/.test(text)) {
    return "system";
  }
  if (/\b(technology|digital|cyber|data|online|automation|ai|virtual|software|platform)\b/.test(text)) {
    return "technology";
  }
  if (/\b(opportunity|participation|mobility|access|work|learning|culture|community|service)\b/.test(text)) {
    return "opportunity";
  }
  return "general";
}

function getCollocationObject(card) {
  const back = String(card.backEnglish || "").trim();
  const highlight = String(card.highlightEnglish || "").trim();
  const base = normalizeSynonymKey(card.baseEnglish);
  if (card.type === "verb" && highlight) {
    const pattern = new RegExp(`^${escapeRegExp(highlight)}\\s+`, "i");
    const object = back.replace(pattern, "").trim();
    if (object && object !== back) return object;
  }
  return base || back;
}

function normalizeManualCollocationKey(value) {
  return String(value || "")
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, " ")
    .trim()
    .replace(/\s+/g, " ");
}

function manualCollocationKey(card) {
  return `${card.topic}::${card.type}::${normalizeManualCollocationKey(card.backEnglish)}`;
}

function curatedCollocationKey(card) {
  return `${card.topic}::${card.type}::${card.backEnglish}`;
}

function curatedOptions(card) {
  const entry = SYNONYM_CURATED_OPTIONS[curatedCollocationKey(card)];
  if (!entry || !Array.isArray(entry.options) || entry.options.length === 0) return null;
  return entry.options;
}

function manualEducationOptions(card) {
  return (

    EDUCATION_MANUAL_OPTIONAL_COLLOCATIONS[`${card.type}::${normalizeBaseKey(card)}`] ||
    null
  );
}

function markManualOptions(options) {
  return options.map((option) => ({ ...option, manual: true }));
}

function uniqueDraftOptions(drafts) {
  const seen = new Set();
  const unique = [];
  drafts.forEach((draft) => {
    const key = `${draft.term || ""}::${draft.pattern || ""}::${draft.phrase || ""}`.toLowerCase();
    if (seen.has(key)) return;
    seen.add(key);
    unique.push(draft);
  });
  return unique;
}

function adjectiveBankForCard(card, profile) {
  return [

    ...(ADJECTIVE_COLLOCATION_BANKS.general || [])
  ];
}

function pickMicroContext(topic, seedText) {
  const pool = TOPIC_MICRO_CONTEXTS[topic] || MICRO_CONTEXTS;
  const seed = Array.from(String(seedText || topic)).reduce((sum, char) => sum + char.charCodeAt(0), 0);
  return pool[seed % pool.length];
}

function pickScene(context, seedText) {
  const scenes = CONTEXT_SCENES[context] || CONTEXT_SCENES.education;
  const seed = Array.from(String(seedText || context)).reduce((sum, char) => sum + char.charCodeAt(0), 0);
  return scenes[seed % scenes.length];
}

function getSynonymDrafts(card) {
  const options = curatedOptions(card);
  if (options) return markManualOptions(options);
  const manualOptions = manualEducationOptions(card);
  if (manualOptions) return markManualOptions(manualOptions);
  const profile = collocationProfile(card);
  const typedBaseKey = `${card.type}::${normalizeBaseKey(card)}`;
  const overrideOptions = COLLOCATION_OVERRIDES[typedBaseKey] || [];
  if (overrideOptions.length) return overrideOptions;
  const typedBaseDrafts = SYNONYM_DRAFTS[typedBaseKey] || [];
  if (typedBaseDrafts.length) return typedBaseDrafts;
  const highlightKey = normalizeSynonymKey(card.highlightEnglish);
  const baseKey = normalizeBaseKey(card);
  const drafts = uniqueDraftOptions([
    ...(SYNONYM_DRAFTS[highlightKey] || []),
    ...(SYNONYM_DRAFTS[baseKey] || [])
  ]);
  if (card.type === "verb") {
    return balanceVerbStances(card, drafts);
  }
  return balanceAdjectiveStances(card, uniqueDraftOptions([
    ...drafts,
    ...adjectiveBankForCard(card, profile)
  ]));
}

function verbBankForCard(card, profile) {
  if (profile === "technology" && TOPIC_VERB_BANKS[card.topic]) {
    return TOPIC_VERB_BANKS[card.topic];
  }
  return VERB_COLLOCATION_BANKS[profile] || VERB_COLLOCATION_BANKS.general;
}

function rotateDrafts(drafts, seedText) {
  if (!drafts.length) return drafts;
  const seed = Array.from(String(seedText || "")).reduce((sum, char) => sum + char.charCodeAt(0), 0);
  const offset = seed % drafts.length;
  return [...drafts.slice(offset), ...drafts.slice(0, offset)];
}

function balanceVerbStances(card, drafts) {
  const profile = collocationProfile(card);
  const bank = rotateDrafts(verbBankForCard(card, profile), card.backEnglish);
  const seed = Array.from(String(card.backEnglish || "")).reduce((sum, char) => sum + char.charCodeAt(0), 0);
  const merged = [...drafts, ...bank].filter((draft) => !REPETITIVE_VERB_TERMS.has(draft.term));
  const selected = [];
  ["Positive", "Neutral", "Negative"].forEach((stance) => {
    const candidates = merged.filter((draft) => draft.stance === stance && !selected.some((item) => item.term === draft.term));
    const option = candidates.length ? candidates[seed % candidates.length] : null;
    if (option) selected.push(option);
  });
  merged.forEach((draft) => {
    if (selected.length < 4 && !selected.some((item) => item.term === draft.term)) selected.push(draft);
  });
  return selected;
}

function balanceAdjectiveStances(card, drafts) {
  const seed = Array.from(String(card.backEnglish || "")).reduce((sum, char) => sum + char.charCodeAt(0), 0);
  const selected = [];
  ["Positive", "Neutral", "Negative"].forEach((stance) => {
    const candidates = drafts.filter((draft) => draft.stance === stance && !selected.some((item) => item.term === draft.term));
    const option = candidates.length ? candidates[seed % candidates.length] : null;
    if (option) selected.push(option);
  });
  rotateDrafts(drafts, card.backEnglish).forEach((draft) => {
    if (selected.length < 3 && !selected.some((item) => item.term === draft.term)) selected.push(draft);
  });
  return selected;
}

function replaceFirstWordPhrase(text, from, to) {
  const source = String(text || "");
  const pattern = new RegExp(`^${escapeRegExp(String(from || ""))}(\\b|\\s|$)`, "i");
  if (pattern.test(source)) return source.replace(pattern, `${to}$1`).replace(/\s+/g, " ").trim();
  return source.replace(new RegExp(escapeRegExp(String(from || "")), "i"), to).replace(/\s+/g, " ").trim();
}

function escapeRegExp(value) {
  return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
}

  if (card.type === "adjective") {

      return `这条搭配适合把「${object}」作为需要测试、监管、比较或评估的对象，语气偏分析。`;
    }
    return `这条搭配适合批判「${object}」被误用、过度使用、忽视或造成反效果的情况。`;
  }
  if (option.stance === "Positive") {
    return `这条搭配适合强调「${phrase}」的价值、效果或可取之处。`;
  }
  if (option.stance === "Neutral") {
    return `这条搭配适合客观描述「${phrase}」的类型、范围或具体属性。`;
  }
  return `这条搭配适合批判「${phrase}」带来的风险、缺口或负面影响。`;
}

function hasMicroContext(example, context) {
  const lower = String(example || "").toLowerCase();
  if (lower.includes(`in ${context}`)) return true;
  return (CONTEXT_SCENES[context] || []).some((scene) => lower.includes(scene.toLowerCase().split(" ").slice(0, 3).join(" ")));
}

function reviewSynonymOption(card, option, phrase, usedOpenings) {
  const issues = [];
  const example = String(option.example || "");
  const context = option.microContext || pickMicroContext(card.topic, phrase);
  const opening = example.split(/\s+/).slice(0, 4).join(" ").toLowerCase();
  if (!example) issues.push("missing-example");
  if (!hasMicroContext(example, context)) issues.push("missing-micro-context");
  if (!example.toLowerCase().includes(String(option.term || "").toLowerCase().split(" ")[0])) issues.push("missing-synonym");
  if (GENERIC_SENTENCE_PATTERNS.some((pattern) => pattern.test(example))) issues.push("generic-template");
  if (opening && usedOpenings.has(opening)) issues.push("repeated-opening");
  return { passed: issues.length === 0, issues, context, opening };
}

function noteQualityIssues(issues) {
  issues.forEach((issue) => {
    QUALITY_REVIEW_REPORT.issueCounts[issue] = (QUALITY_REVIEW_REPORT.issueCounts[issue] || 0) + 1;
  });
}

function reviewAndRewriteSynonymOptions(card, drafts) {
  const usedOpenings = new Set();
  return drafts.slice(0, 3).map((draft) => {
    if (draft.manual) {
      const phrase = draft.pattern || draft.phrase || buildAlternativeExpression(card, draft);
      const microContext = draft.microContext || pickMicroContext(card.topic, `${card.backEnglish}-${draft.term}`);
      const option = { ...draft, phrase, microContext };
      option.tone = fullCollocationTone(card, option, phrase);
      option.reviewNote = "Manually authored card-level optional collocation.";
      option.reviewPassed = true;
      option.reviewIssues = [];
      return option;
    }
    QUALITY_REVIEW_REPORT.reviewedOptions += 1;
    const phrase = buildAlternativeExpression(card, draft);
    const microContext = draft.microContext || pickMicroContext(card.topic, `${card.backEnglish}-${draft.term}`);
    let option = { ...draft, phrase, microContext };
    option.tone = fullCollocationTone(card, option, phrase);
    let review = reviewSynonymOption(card, option, phrase, usedOpenings);
    if (!review.passed) {
      noteQualityIssues(review.issues);
      QUALITY_REVIEW_REPORT.rewrittenOptions += 1;
      option = {
        ...option,
        example: createMicroContextExample(card, option, phrase, microContext),
        reviewNote: "Self-reviewed and rewritten for micro-context, specificity, and non-template phrasing."
      };
      review = reviewSynonymOption(card, option, phrase, usedOpenings);
    } else {
      option.reviewNote = "Self-reviewed for micro-context and template repetition.";
    }
    if (review.opening) usedOpenings.add(review.opening);
    option.reviewPassed = review.passed;
    option.reviewIssues = review.issues;
    return option;
  });
}

function buildSynonymNetworks(card) {
  const drafts = getSynonymDrafts(card);
  if (!drafts.length) return [];
  return [
    {
      core: card.highlightEnglish,
      coreExpression: card.backEnglish,
      role: card.type,
      options: reviewAndRewriteSynonymOptions(card, drafts)
    }
  ];
}

function makeCard(row, kind) {
  const [topic, baseChinese, baseEnglish, adjChinese, adjHighlight, adjEnglish, verbChinese, verbHighlight, verbEnglish] = row;
  const isAdjective = kind === "adjective";
  const highlightChinese = isAdjective ? adjChinese : verbChinese;
  const highlightEnglish = isAdjective ? adjHighlight : verbHighlight;
  const backEnglish = isAdjective ? adjEnglish : verbEnglish;
  const card = {
    topic,
    baseChinese,
    baseEnglish,
    type: isAdjective ? "adjective" : "verb",
    frontChinese: `${highlightChinese}${baseChinese}`,
    backEnglish,
    highlightChinese,
    highlightEnglish
  };
  card.synonymNetworks = buildSynonymNetworks(card);
  return card;
}

window.FLASHCARD_DATA = BASE_ENTRIES.flatMap((row) => [
  makeCard(row, "adjective"),
  makeCard(row, "verb")
]);

      .replaceAll("&", "&amp;")

      .replaceAll("'", "&#039;");

  function renderHighlighted(text, highlight) {
    const escapedText = escapeHtml(text);
    if (!highlight) return escapedText;
    const index = text.toLowerCase().indexOf(highlight.toLowerCase());
    if (index < 0) return escapedText;
    const before = escapeHtml(text.slice(0, index));
    const marked = escapeHtml(text.slice(index, index + highlight.length));
    const after = escapeHtml(text.slice(index + highlight.length));
    return `${before}<span class="highlight">${marked}</span>${after}`;
  }

  function todayStart(value = Date.now()) {
    const date = new Date(value);
    date.setHours(0, 0, 0, 0);
    return date.getTime();
  }

  function addDays(value, days) {
    return todayStart(value) + Math.max(0, days) * DAY_MS;
  }

  function normalizeReviewRecord(id, value) {
    const now = Date.now();
    if (value && typeof value === "object" && !Array.isArray(value)) {
      return {
        version: MEMORY_VERSION,
        id,
        status: value.status || (value.lastRating === "again" ? "weak" : "learning"),
        lastRating: value.lastRating || "",
        reviewCount: Number(value.reviewCount) || 0,
        wrongCount: Number(value.wrongCount) || 0,
        lapseCount: Number(value.lapseCount) || 0,
        ease: Math.max(MIN_EASE, Number(value.ease) || DEFAULT_EASE),
        intervalDays: Math.max(0, Number(value.intervalDays) || 0),
        lastReviewedAt: Number(value.lastReviewedAt) || 0,
        nextReviewAt: Number(value.nextReviewAt) || now,
        createdAt: Number(value.createdAt) || now,
        updatedAt: Number(value.updatedAt) || now
      };
    }
    if (value === "weak") {
      return {
        version: MEMORY_VERSION,
        id,
        status: "weak",
        lastRating: "again",
        reviewCount: 0,
        wrongCount: 1,
        lapseCount: 0,
        ease: DEFAULT_EASE,
        intervalDays: 0,
        lastReviewedAt: 0,
        nextReviewAt: now,
        createdAt: now,
        updatedAt: now
      };
    }
    if (value === "known") {
      return {
        version: MEMORY_VERSION,
        id,
        status: "known",
        lastRating: "good",
        reviewCount: 1,
        wrongCount: 0,
        lapseCount: 0,
        ease: DEFAULT_EASE,
        intervalDays: 1,
        lastReviewedAt: now,
        nextReviewAt: addDays(now, 1),
        createdAt: now,
        updatedAt: now
      };
    }
    return null;
  }

  function getReviewRecord(card) {
    const id = cardId(card);
    const record = normalizeReviewRecord(id, reviewStates.get(id));
    if (record) reviewStates.set(id, record);
    return record;
  }

  function isDue(card, value = Date.now()) {
    const record = getReviewRecord(card);
    return !record || (Number(record.nextReviewAt) || 0) <= value;
  }

  function dueCount(topic = state.topic) {
    if (!topic) return 0;
    return cardsForTopic(topic).filter((card) => isDue(card)).length;
  }

  function weakCount(topic = state.topic) {
    if (!topic) return 0;
    return cardsForTopic(topic).filter((card) => reviewState(card) === "weak" || markedCards.has(cardId(card))).length;
  }

  function knownCount(topic = state.topic) {
    if (!topic) return 0;
    return cardsForTopic(topic).filter((card) => reviewState(card) === "known").length;
  }

  function reviewedTodayCount() {
    const start = todayStart();
    return reviewLogs.filter((entry) => Number(entry.reviewedAt) >= start).length;
  }

  function priorityTopics() {
    return topicOrder
      .map((topic) => {
        const total = cardsForTopic(topic).length;
        const due = dueCount(topic);
        const weak = weakCount(topic);
        const known = knownCount(topic);
        return { topic, total, due, weak, known, score: due * 2 + weak };
      })
      .sort((a, b) => b.score - a.score || topicOrder.indexOf(a.topic) - topicOrder.indexOf(b.topic));
  }

  function duePriorityTopics() {
    return priorityTopics()
      .slice()
      .sort((a, b) => b.due - a.due || b.weak - a.weak || topicOrder.indexOf(a.topic) - topicOrder.indexOf(b.topic));
  }

  function nextIntervalFor(card, rating) {
    const id = cardId(card);
    const previous = normalizeReviewRecord(id, reviewStates.get(id));
    const ease = Math.max(MIN_EASE, previous?.ease || DEFAULT_EASE);
    const intervalDays = Math.max(0, Number(previous?.intervalDays) || 0);
    if (rating === "again") return 0;
    if (rating === "hard") return intervalDays <= 0 ? 1 : Math.max(1, Math.round(intervalDays * 1.2));
    if (rating === "easy") return intervalDays <= 0 ? 4 : Math.max(4, Math.round(intervalDays * ease * 1.3));
    return intervalDays <= 0 ? 1 : Math.max(1, Math.round(intervalDays * ease));
  }

  function intervalLabel(days) {
    if (days <= 0) return "今天";
    if (days === 1) return "1天";
    return `${days}天`;

  function createZenSessionStats(total) {

  function scheduleReview(card, rating) {
    const id = cardId(card);
    const now = Date.now();
    const previous = normalizeReviewRecord(id, reviewStates.get(id)) || {
      version: MEMORY_VERSION,
      id,
      status: "new",
      lastRating: "",
      reviewCount: 0,
      wrongCount: 0,
      lapseCount: 0,
      ease: DEFAULT_EASE,
      intervalDays: 0,
      lastReviewedAt: 0,
      nextReviewAt: now,
      createdAt: now,
      updatedAt: now
    };
    let ease = Math.max(MIN_EASE, previous.ease || DEFAULT_EASE);
    let intervalDays = Math.max(0, Number(previous.intervalDays) || 0);
    let wrongCount = Number(previous.wrongCount) || 0;
    let lapseCount = Number(previous.lapseCount) || 0;
    let status = "learning";

    if (rating === "again") {
      ease = Math.max(MIN_EASE, ease - 0.2);
      intervalDays = 0;
      wrongCount += 1;
      lapseCount += previous.reviewCount > 0 ? 1 : 0;
      status = "weak";
      markedCards.add(id);
    } else if (rating === "hard") {
      ease = Math.max(MIN_EASE, ease - 0.15);
      intervalDays = intervalDays <= 0 ? 1 : Math.max(1, Math.round(intervalDays * 1.2));
      status = "weak";
      markedCards.add(id);
    } else if (rating === "easy") {
      ease += 0.15;
      intervalDays = intervalDays <= 0 ? 4 : Math.max(4, Math.round(intervalDays * ease * 1.3));
      status = "known";
      markedCards.delete(id);
    } else {
      intervalDays = intervalDays <= 0 ? 1 : Math.max(1, Math.round(intervalDays * ease));
      status = "known";
      markedCards.delete(id);
    }

    const record = {
      ...previous,
      version: MEMORY_VERSION,
      status,
      lastRating: rating,
      reviewCount: (Number(previous.reviewCount) || 0) + 1,
      wrongCount,
      lapseCount,
      ease,
      intervalDays,
      lastReviewedAt: now,
      nextReviewAt: rating === "again" ? now : addDays(now, intervalDays),
      updatedAt: now
    };
    reviewStates.set(id, record);
    appendReviewLog(card, rating, previous, record);
    saveReviewStates();
    saveBank();
    return record;
  }

  function appendReviewLog(card, rating, previous, next) {
    const reviewedAt = next.lastReviewedAt || Date.now();
    reviewLogs.push({
      id: `${cardId(card)}::${reviewedAt}::${next.reviewCount}`,
      cardId: cardId(card),
      topic: card.topic,
      type: card.type,
      rating,
      reviewedAt,
      previousStatus: previous.status || "new",
      nextStatus: next.status,
      previousEase: Number(previous.ease) || DEFAULT_EASE,
      nextEase: next.ease,
      previousIntervalDays: Number(previous.intervalDays) || 0,
      nextIntervalDays: next.intervalDays,
      previousDueAt: Number(previous.nextReviewAt) || 0,
      nextDueAt: next.nextReviewAt
    });
    saveReviewLogs();
  }

  function memoryPayload() {
    const exportedAt = new Date().toISOString();
    const cards = allCards.map((card) => ({
      id: cardId(card),
      topic: card.topic,
      type: card.type,
      frontChinese: card.frontChinese,
      backEnglish: card.backEnglish,
      baseChinese: card.baseChinese || "",
      baseEnglish: card.baseEnglish || ""
    }));
    const reviewState = cards.map((card) => {
      const record = normalizeReviewRecord(card.id, reviewStates.get(card.id));
      return record ? {
        cardId: card.id,
        status: record.status,
        lastRating: record.lastRating,
        reviewCount: record.reviewCount,
        wrongCount: record.wrongCount,
        lapseCount: record.lapseCount,
        ease: record.ease,
        intervalDays: record.intervalDays,
        lastReviewedAt: record.lastReviewedAt,
        nextReviewAt: record.nextReviewAt,
        createdAt: record.createdAt,
        updatedAt: record.updatedAt
      } : {
        cardId: card.id,
        status: "new",
        lastRating: "",
        reviewCount: 0,
        wrongCount: 0,
        lapseCount: 0,
        ease: DEFAULT_EASE,
        intervalDays: 0,
        lastReviewedAt: 0,
        nextReviewAt: 0,
        createdAt: 0,
        updatedAt: 0
      };
    });
    return {
      app: "IELTS-Topic-Collocation",
      schemaId: MEMORY_SCHEMA_ID,
      schemaVersion: 1,
      version: MEMORY_VERSION,
      exportedAt,
      cardsTotal: allCards.length,
      tables: {
        cards,
        review_state: reviewState,
        review_log: [...reviewLogs],
        settings: [{
          key: "memory_schema_id",
          value: MEMORY_SCHEMA_ID,
          updatedAt: exportedAt
        }, {
          key: "algorithm",
          value: "sm2-lite",
          updatedAt: exportedAt
        }]
      },
      bank: [...markedCards],
      reviewLog: [...reviewLogs],
      reviews: Object.fromEntries([...reviewStates].map(([id, value]) => {
        const record = normalizeReviewRecord(id, value);
        return [id, record || value];
      }))
    };
  }

  function exportMemory() {
    const payload = JSON.stringify(memoryPayload(), null, 2);
    const stamp = new Date().toISOString().slice(0, 10);
    const filename = `ielts-topic-collocation-memory-${stamp}.json`;
    const blob = new Blob([payload], { type: "application/json" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = filename;
    document.body.appendChild(link);
    link.click();
    link.remove();
    URL.revokeObjectURL(link.href);
    showToast("Memory exported");
  }

  function importMemoryFile(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.addEventListener("load", () => {
      try {
        const payload = JSON.parse(String(reader.result || "{}"));
        const importedReviews = {};
        const tableState = payload.tables?.review_state || payload.review_state || payload.reviewState || [];
        if (Array.isArray(tableState)) {
          tableState.forEach((row) => {
            const id = row.cardId || row.id;
            if (!id) return;
            importedReviews[id] = {
              ...row,
              id,
              version: MEMORY_VERSION
            };
          });
        }
        if (payload.reviews && typeof payload.reviews === "object") {
          Object.assign(importedReviews, payload.reviews);
        }
        Object.entries(importedReviews).forEach(([id, value]) => {
          const record = normalizeReviewRecord(id, value);
          if (record) reviewStates.set(id, record);
        });
        const importedLogs = payload.tables?.review_log || payload.review_log || payload.reviewLog || [];
        if (Array.isArray(importedLogs)) {
          const existingIds = new Set(reviewLogs.map((entry) => entry.id));
          importedLogs.forEach((entry) => {
            if (!entry || typeof entry !== "object") return;
            const id = entry.id || `${entry.cardId || "card"}::${entry.reviewedAt || Date.now()}::${entry.rating || "rating"}`;
            if (existingIds.has(id)) return;
            reviewLogs.push({ ...entry, id });
            existingIds.add(id);
          });
        }
        if (Array.isArray(payload.bank)) {
          payload.bank.forEach((id) => markedCards.add(id));
        }
        [...reviewStates].forEach(([id, value]) => {
          const record = normalizeReviewRecord(id, value);
          if (record?.status === "weak") markedCards.add(id);
          if (record && ["known", "graduated"].includes(record.status)) markedCards.delete(id);
        });
        saveReviewStates();
        saveReviewLogs();
        saveBank();
        showToast("Memory imported");
        renderStudyPage(state.topic || state.lastTopic || "Technology");
      } catch (error) {

  function stableHash(value) {
    let hash = 0;
    for (let index = 0; index < value.length; index += 1) {

  function cardSearchHaystack(card) {
    return [
      card.baseChinese,

      card.frontChinese,
      card.backEnglish,
      card.type,
      synonymSearchText(card)
    ].join(" ").toLowerCase();
  }

  function subtopicSearchSeed(topic, subtopic) {
    const candidates = [
      ...(subtopic[2] || []),
      subtopic[0],
      subtopic[1]
    ].flatMap((value) => {
      const text = String(value || "").trim();
      return [
        text,
        ...text.split(/[\s/:,&-]+/).filter((part) => part.length >= 5)
      ];
    });
    const topicCards = cardsForTopic(topic);
    const match = candidates.find((candidate) => {
      const needle = candidate.toLowerCase();
      return needle && topicCards.some((card) => cardSearchHaystack(card).includes(needle));
    });
    return match || "";
  }

  function moveZen(delta) {

    }
    const reviewedIndex = cards.findIndex((card) => cardId(card) === cardId(reviewedCard));
    if (reviewedIndex >= 0 && cards.length > 1) {
      state.zenIndex = (reviewedIndex + 1) % cards.length;
    } else if (state.zenIndex >= cards.length) {

    }

    saveZenProgress();

  function routeFromHash() {
    const hash = window.location.hash.replace(/^#/, "");
    if (hash === "bank") return { type: "bank" };
    if (!hash || hash === "topics") return { type: "landing" };
    const recentMatch = hash.match(/^recent\/(.+)$/);
    if (recentMatch) {
      const topic = decodeURIComponent(recentMatch[1]);
      return topicOrder.includes(topic) ? { type: "recent", topic } : { type: "landing" };
    }
    const topicMatch = hash.match(/^topic\/(.+)$/);
    if (!topicMatch) return { type: "landing" };
    const topic = decodeURIComponent(topicMatch[1]);
    return topicOrder.includes(topic) ? { type: "topic", topic } : { type: "landing" };
  }

          const next = priorities[(activeIndex + 1 + priorities.length) % priorities.length];

        }
      });
    });

    let topicReelAnimating = false;
    let topicReelTimer = null;
    const TOPIC_REEL_STEP_MS = 360;
    const TOPIC_REEL_STEP_EASING = "cubic-bezier(0.16, 0.9, 0.18, 1)";

    function clearTopicReelMotion(reelWindow) {
      if (!reelWindow) return;
      reelWindow.classList.remove("is-morphing");
      const reelList = reelWindow.querySelector(".topic-reel-list");
      if (reelList) {
        reelList.style.removeProperty("transition");
        reelList.style.removeProperty("transform");
      }
      reelWindow.querySelectorAll(".topic-reel-card").forEach((card) => {
        card.style.removeProperty("--morph-x");
        card.style.removeProperty("--morph-y");
        card.style.removeProperty("--morph-scale-x");
        card.style.removeProperty("--morph-scale-y");
        card.classList.remove("is-morph-card", "is-morph-new", "is-morph-playing");
      });
    }

    function wrappedPriorityIndex(index) {
      return (index + priorities.length) % priorities.length;
    }

    function topicReelStepPath(offset) {
      const activeIndex = priorities.findIndex((item) => item.topic === state.topicReelTopic);
      if (activeIndex < 0 || offset === 0) return [];
      const direction = offset > 0 ? 1 : -1;
      const stepCount = Math.abs(offset);
      return Array.from({ length: stepCount }, (_, index) => {
        const stepIndex = wrappedPriorityIndex(activeIndex + direction * (index + 1));
        return priorities[stepIndex].topic;
      });
    }

    function topicReelRects() {
      return new Map(
        Array.from(topicLanding.querySelectorAll(".topic-reel-card"), (card) => [
          card.dataset.topic,
          card.getBoundingClientRect()
        ])
      );
    }

    function animateTopicReelStep(topic) {
      const reelWindow = topicLanding.querySelector(".topic-reel-window");
      if (!reelWindow || topic === state.topicReelTopic) {
        state.topicReelTopic = topic;
        renderTopicReel();
        return Promise.resolve();
      }

      const beforeRects = topicReelRects();
      state.topicReelTopic = topic;
      renderTopicReel({ skipMotionClear: true });
      const afterCards = Array.from(topicLanding.querySelectorAll(".topic-reel-card"));
      reelWindow.classList.add("is-morphing");

      afterCards.forEach((card) => {
        const beforeRect = beforeRects.get(card.dataset.topic);
        const afterRect = card.getBoundingClientRect();
        if (beforeRect) {
          const scaleX = beforeRect.width / Math.max(afterRect.width, 1);
          const scaleY = beforeRect.height / Math.max(afterRect.height, 1);
          card.style.setProperty("--morph-x", `${beforeRect.left - afterRect.left}px`);
          card.style.setProperty("--morph-y", `${beforeRect.top - afterRect.top}px`);
          card.style.setProperty("--morph-scale-x", scaleX.toFixed(4));
          card.style.setProperty("--morph-scale-y", scaleY.toFixed(4));
          card.classList.add("is-morph-card");
        } else {
          card.classList.add("is-morph-new");
        }
      });

      return new Promise((resolve) => {
        const finish = () => {
          window.clearTimeout(topicReelTimer);
          clearTopicReelMotion(reelWindow);
          resolve();
        };

        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            afterCards.forEach((card) => {
              card.classList.add("is-morph-playing");
            });
          });
        });
        topicReelTimer = window.setTimeout(finish, TOPIC_REEL_STEP_MS + 80);
      });
    }

    async function animateTopicReelTo(topic, offset) {
      if (topicReelAnimating || topic === state.topicReelTopic) return;
      const path = topicReelStepPath(offset);
      const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      if (prefersReducedMotion || path.length === 0) {
        state.topicReelTopic = topic;
        renderTopicReel();
        return;
      }

      topicReelAnimating = true;
      window.clearTimeout(topicReelTimer);
      try {
        for (const stepTopic of path) {
          await animateTopicReelStep(stepTopic);
        }
      } finally {
        topicReelAnimating = false;
      }
    }

    function renderTopicReel(options = {}) {
      const activeIndex = Math.max(0, priorities.findIndex((item) => item.topic === state.topicReelTopic));
      const reelButton = topicLanding.querySelector('[data-action="open-reel-topic"]');
      const reelWindow = topicLanding.querySelector(".topic-reel-window");
      const reelList = topicLanding.querySelector(".topic-reel-list");
      const activeItem = priorities[activeIndex];
      const activeMeta = topicMeta[activeItem.topic];
      if (reelButton) reelButton.textContent = `Start ${activeMeta.label}`;
      if (!options.skipMotionClear) clearTopicReelMotion(reelWindow);
      reelList.innerHTML = "";

      for (let offset = -2; offset <= 2; offset += 1) {
        const item = priorities[(activeIndex + offset + priorities.length) % priorities.length];
        const meta = topicMeta[item.topic];
        const card = document.createElement("button");
        card.type = "button";
        card.className = "topic-reel-card";
        card.dataset.topic = item.topic;
        if (offset === 0) card.classList.add("is-active");
        if (Math.abs(offset) >= 2) card.classList.add("is-far");
        card.style.setProperty("--reel-index", offset + 2);
        card.style.setProperty("--topic", meta.color);
        card.style.setProperty("--accent", meta.accent);
        card.setAttribute(
          "aria-label",
          offset === 0 ? `Study selected topic ${meta.label}` : `Select topic ${meta.label}`
        );
        card.innerHTML = `
          <div>
            <span class="topic-reel-kicker">${offset === 0 ? "Selected" : "Candidate"} · ${escapeHtml(meta.zh)}</span>
            <strong>${escapeHtml(meta.label)}</strong>
          </div>
          <span class="topic-reel-meta">${item.due} due today / ${item.weak} weak</span>
          ${offset === 0 ? `
            <span class="topic-reel-due-badge" aria-label="${item.due} due today, ${item.weak} weak">
              <strong>${item.due}</strong>
              <span>Due today</span>
              <em>${item.weak} weak</em>
            </span>
          ` : ""}
        `;
        card.addEventListener("click", () => {
          if (offset === 0) {
            navigateToTopic(item.topic);
            return;
          }
          animateTopicReelTo(item.topic, offset);
        });
        reelList.appendChild(card);
      }
    }

    renderTopicReel();
  }

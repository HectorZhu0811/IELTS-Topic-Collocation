<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Extra Angle Card Preview</title>
<style>
:root{--topic:#9a6335;--ink:#242529;--muted:#707076;--panel:#fffdfa;--line:#dec9b5;--green:#448361;--gray:#787774;--red:#c94e51;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:linear-gradient(135deg,#f6efe7,#fffdf8 54%,#f3f6f2);color:var(--ink)}main{width:min(1160px,calc(100vw - 28px));margin:0 auto;padding:28px 0}.preview-header{display:flex;align-items:end;justify-content:space-between;gap:18px;margin-bottom:18px}.preview-header h1{margin:0;font-size:clamp(30px,5vw,56px);line-height:.95}.preview-header p{max-width:560px;margin:8px 0 0;color:var(--muted);font-size:15px;line-height:1.45}.actions{display:flex;gap:10px;flex-wrap:wrap}.stage{display:grid;grid-template-columns:minmax(0,1fr) 425px;gap:18px;align-items:stretch}.stage:not(.has-angle){grid-template-columns:minmax(0,760px);justify-content:center}.stage:not(.has-angle) .angle-panel{display:none}.flashcard{display:block;width:100%;min-height:560px;border:0;padding:0;background:transparent;perspective:1400px;cursor:pointer}.card-inner{position:relative;width:100%;height:100%;min-height:560px;transition:transform 620ms cubic-bezier(.2,.72,.18,1);transform-style:preserve-3d}.flashcard.is-flipped .card-inner{transform:rotateY(180deg)}.face{position:absolute;inset:0;display:grid;grid-template-rows:auto 1fr auto;gap:18px;padding:clamp(26px,5vw,56px);border:1px solid var(--line);border-radius:8px;background:#fffdf9;backface-visibility:hidden;-webkit-backface-visibility:hidden;box-shadow:0 24px 60px rgba(64,45,29,.08);overflow:hidden}.back{transform:rotateY(180deg);background:color-mix(in srgb,var(--topic),#fff 88%)}.label{color:var(--topic);font-size:12px;font-weight:950;text-transform:uppercase}.card-text{align-self:center;font-size:clamp(40px,7vw,82px);line-height:1.08;font-weight:780;text-align:left}.highlight{color:var(--topic)}.hint{color:var(--muted);font-size:13px;font-weight:900}.angle-panel{display:grid;align-content:center;gap:10px;min-height:560px;padding:0;background:transparent;opacity:0;transform:translateX(16px) scale(.985);pointer-events:none;transition:opacity 360ms ease,transform 420ms cubic-bezier(.2,.72,.18,1)}.angle-panel.is-visible{opacity:1;transform:translateX(0) scale(1);pointer-events:auto}.angle-kicker,.angle-panel h2{display:none}.angle-grid{display:grid;gap:12px}.angle-card{display:grid;gap:10px;padding:18px;border:1px solid color-mix(in srgb,var(--tone),#fff 78%);border-radius:8px;background:linear-gradient(180deg,rgba(255,255,255,.48),rgba(255,255,255,0)),color-mix(in srgb,var(--tone),#fff 91%);color:color-mix(in srgb,var(--tone),#2f3437 35%);opacity:0;transform:translateY(10px) scale(.98);animation:angle-in 420ms cubic-bezier(.2,.72,.18,1) forwards}.angle-card:nth-child(2){animation-delay:70ms}.angle-card:nth-child(3){animation-delay:140ms}.angle-card strong{color:#2f3437;font-size:20px;line-height:1.25}.angle-card p{margin:0;font-size:16px;line-height:1.45}.angle-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}.tag{padding:5px 10px;border-radius:999px;background:rgba(255,255,255,.7);color:var(--tone);font-size:12px;font-weight:950;text-transform:uppercase;box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--tone),#fff 72%)}.positive{--tone:var(--green)}.neutral{--tone:var(--gray)}.negative{--tone:var(--red)}.show-all-link{justify-self:start;height:40px;padding:0 2px;border:0;background:transparent;color:var(--topic);font-size:16px}.show-all-link:hover{text-decoration:underline}button{height:42px;padding:0 16px;border:1px solid color-mix(in srgb,var(--topic),#fff 60%);border-radius:8px;background:#fff;color:var(--ink);font-weight:950;cursor:pointer}button.primary{background:var(--topic);color:#fff}.review-bar{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;margin-top:14px;padding:10px;border:1px solid var(--line);border-radius:8px;background:rgba(255,255,255,.9)}.review-bar button:first-child{background:color-mix(in srgb,var(--topic),#fff 90%);color:var(--topic)}@keyframes angle-in{to{opacity:1;transform:translateY(0) scale(1)}}@media(max-width:760px){main{width:100%;height:100vh;padding:10px;overflow:hidden}.preview-header{display:none}.stage{height:calc(100vh - 108px);grid-template-columns:1fr;grid-template-rows:44% 56%;gap:8px}.stage:not(.has-angle){grid-template-rows:1fr}.flashcard,.card-inner{min-height:0;height:100%}.face{padding:16px}.card-text{font-size:clamp(30px,11vw,48px)}.angle-panel{min-height:0;height:100%;overflow:auto;padding:0;align-content:start}.angle-panel h2{font-size:18px}.review-bar{height:78px;margin-top:8px;grid-template-columns:repeat(5,minmax(0,1fr));gap:6px}.review-bar button{height:54px;padding:0 4px;font-size:13px}}
</style>
</head>
<body>
<main>
<header class="preview-header"><div><h1>Extra angle preview</h1><p>Flip animation is restored. The right panel appears after the card flips, first as one small card, then expands into three cards with staggered motion.</p></div><div class="actions"><button id="flipButton" class="primary" type="button">Flip card</button></div></header>
<section id="stage" class="stage"><button id="flashcard" class="flashcard" type="button"><span class="card-inner"><span class="face front"><span class="label">Chinese front</span><span class="card-text"><span class="highlight">&#x53ef;&#x6301;&#x7eed;&#x7684;</span>&#x7ecf;&#x6d4e;&#x589e;&#x957f;</span><span class="hint">Click to reveal answer</span></span><span class="face back"><span class="label">English back</span><span class="card-text"><span class="highlight">sustainable</span><br>economic<br>growth</span><span class="hint">Now pick up one extra angle</span></span></span></button><aside id="anglePanel" class="angle-panel"><p class="angle-kicker">One extra angle</p><h2>Try one optional collocation</h2><div id="angleGrid" class="angle-grid"></div><button id="panelToggleButton" class="show-all-link" type="button">Show all 3</button></aside></section>
<nav class="review-bar"><button type="button">&#x65b0;&#x5361;</button><button type="button">&#x4e0d;&#x4f1a;</button><button type="button">&#x6a21;&#x7cca;</button><button type="button">&#x8ba4;&#x8bc6;</button><button type="button">&#x719f;&#x7ec3;</button></nav>
</main>
<script>
const cards=[{tone:'positive',stance:'Positive',phrase:'stable economic growth',zh:'&#x7a33;&#x5b9a;&#x7684;&#x7ecf;&#x6d4e;&#x589e;&#x957f;',note:'&#x9002;&#x5408;&#x5f3a;&#x8c03;&#x589e;&#x957f;&#x8d28;&#x91cf;&#x53ef;&#x9760;&#xff0c;&#x7ecf;&#x6d4e;&#x6307;&#x6807;&#x548c;&#x5e02;&#x573a;&#x9884;&#x671f;&#x6bd4;&#x8f83;&#x5065;&#x5eb7;&#x3002;'},{tone:'neutral',stance:'Neutral',phrase:'long-term economic growth',zh:'&#x957f;&#x671f;&#x7ecf;&#x6d4e;&#x589e;&#x957f;',note:'&#x9002;&#x5408;&#x5ba2;&#x89c2;&#x63cf;&#x8ff0;&#x7ecf;&#x6d4e;&#x589e;&#x957f;&#x7684;&#x65f6;&#x95f4;&#x8de8;&#x5ea6;&#x3002;'},{tone:'negative',stance:'Negative',phrase:'fragile economic growth',zh:'&#x8106;&#x5f31;&#x7684;&#x7ecf;&#x6d4e;&#x589e;&#x957f;',note:'&#x9002;&#x5408;&#x6279;&#x8bc4;&#x589e;&#x957f;&#x7f3a;&#x4e4f;&#x97e7;&#x6027;&#xff0c;&#x5bb9;&#x6613;&#x88ab;&#x5916;&#x90e8;&#x51b2;&#x51fb;&#x6253;&#x65ad;&#x3002;'}];
const stage=document.getElementById('stage'),flashcard=document.getElementById('flashcard'),panel=document.getElementById('anglePanel'),grid=document.getElementById('angleGrid'),flipButton=document.getElementById('flipButton'),panelToggleButton=document.getElementById('panelToggleButton');let flipped=false,showAll=false;
function renderAngles(){const visible=showAll?cards:cards.slice(0,1);grid.innerHTML=visible.map(card=>'<article class="angle-card '+card.tone+'"><div class="angle-head"><strong>'+card.phrase+'</strong><span class="tag">'+card.stance+'</span></div><p>&#x4e2d;&#x6587;&#xff1a;'+card.zh+'</p><p>&#x8bed;&#x6c14;&#xff1a;'+card.note+'</p></article>').join('');const label=showAll?'Show one':'Show all 3';panelToggleButton.textContent=label}
function render(){flashcard.classList.toggle('is-flipped',flipped);panel.classList.toggle('is-visible',flipped);stage.classList.toggle('has-angle',flipped);if(!flipped)showAll=false;renderAngles()}
function flip(){flipped=!flipped;render()}function toggleAll(){if(!flipped)flipped=true;showAll=!showAll;render()}flashcard.addEventListener('click',flip);flipButton.addEventListener('click',flip);panelToggleButton.addEventListener('click',toggleAll);render();
</script>
</body>
</html>

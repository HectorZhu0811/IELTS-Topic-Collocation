<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Minimal Topic Reel Preview</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --ink: #1d1d1f;
      --muted: #6e6e73;
      --line: rgba(29, 29, 31, 0.1);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
    }

    main {
      width: min(1440px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 44px;
    }

    p {
      margin: 0;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(260px, 0.45fr) minmax(620px, 1.55fr);
      gap: 22px;
      align-items: stretch;
    }

    .memory-card,
    .reel {
      min-height: 580px;
      border-radius: 24px;
      background: #fff;
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.06);
    }

    .memory-card {
      display: grid;
      align-content: center;
      justify-content: center;
      padding: clamp(28px, 4vw, 52px);
      border: 0;
      background:
        radial-gradient(circle at 82% 16%, rgba(0, 113, 227, 0.14), transparent 34%),
        linear-gradient(155deg, #fff, #f5f8ff);
      color: var(--ink);
      font-size: clamp(40px, 4vw, 62px);
      font-weight: 950;
      line-height: 0.98;
      text-align: center;
    }

    .reel {
      position: relative;
      display: grid;
      align-content: center;
      gap: 18px;
      padding: 28px;
      overflow: hidden;
    }

    .reel::before,
    .reel::after {
      position: absolute;
      right: 0;
      left: 0;
      z-index: 3;
      height: 116px;
      content: "";
      pointer-events: none;
    }

    .reel::before {
      top: 0;
      background: linear-gradient(180deg, #fff, transparent);
    }

    .reel::after {
      bottom: 0;
      background: linear-gradient(0deg, #fff, transparent);
    }

    .topic {
      --topic: #16a34a;
      --accent: #84cc16;
      display: grid;
      align-content: center;
      min-height: 120px;
      padding: 20px 32px;
      border-radius: 20px;
      background:
        radial-gradient(circle at 84% 20%, color-mix(in srgb, var(--accent), #fff 44%), transparent 40%),
        color-mix(in srgb, var(--topic), #fff 91%);
      opacity: 0.28;
    }

    .topic.is-active {
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      align-content: center;
      gap: 28px;
      min-height: 184px;
      opacity: 1;
      box-shadow: 0 22px 54px color-mix(in srgb, var(--topic), transparent 84%);
    }

    .topic.is-far {
      opacity: 0.14;
    }

    .topic span {
      display: block;
      color: color-mix(in srgb, var(--topic), #111 30%);
      font-size: 13px;
      font-weight: 900;
    }

    .topic strong {
      display: block;
      margin-top: 8px;
      color: color-mix(in srgb, var(--topic), #111 12%);
      font-size: clamp(40px, 5vw, 66px);
      line-height: 1;
      letter-spacing: 0;
    }

    .topic small {
      margin-top: 8px;
      color: color-mix(in srgb, var(--topic), #111 30%);
      font-size: 13px;
      font-weight: 900;
    }

    .due-badge {
      display: none;
    }

    .topic.is-active small {
      display: none;
    }

    .topic.is-active .due-badge {
      display: grid;
      min-width: 148px;
      min-height: 96px;
      padding: 18px 20px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.62);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.84);
      place-items: center;
      text-align: center;
    }

    .due-badge strong {
      margin: 0;
      color: color-mix(in srgb, var(--topic), #111 16%);
      font-size: 44px;
      line-height: 0.9;
    }

    .due-badge span {
      margin-top: 6px;
      color: color-mix(in srgb, var(--topic), #111 26%);
      font-size: 12px;
      font-weight: 950;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .due-badge em {
      margin-top: 4px;
      color: color-mix(in srgb, var(--topic), #111 34%);
      font-size: 11px;
      font-style: normal;
      font-weight: 850;
    }

    @media (max-width: 760px) {
      main {
        width: min(430px, calc(100vw - 20px));
        padding: 16px 0 32px;
      }

      .hero {
        grid-template-columns: 1fr;
      }

      .memory-card {
        min-height: 170px;
        font-size: clamp(34px, 11vw, 48px);
      }

      .reel {
        min-height: 520px;
        padding: 18px;
      }

      .topic {
        min-height: 106px;
        padding: 18px 24px;
      }

      .topic.is-active {
        grid-template-columns: 1fr;
        gap: 14px;
        min-height: 158px;
      }

      .topic.is-active .due-badge {
        width: fit-content;
        min-width: 128px;
        min-height: 68px;
        grid-template-columns: auto 1fr;
        column-gap: 10px;
        padding: 12px 16px;
        place-items: center start;
      }

      .due-badge strong {
        grid-row: span 2;
        font-size: 32px;
      }

      .due-badge span {
        margin-top: 0;
      }

      .topic strong {
        font-size: clamp(32px, 11vw, 46px);
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero" aria-label="Minimal homepage preview">
      <button class="memory-card" type="button">Memory bank</button>
      <div class="reel">
        <article class="topic is-far" style="--topic:#9333ea;--accent:#e879f9">
          <span>Candidate · 艺术</span>
          <strong>Arts</strong>
          <small>46 due today / 0 weak</small>
        </article>
        <article class="topic" style="--topic:#ca8a04;--accent:#fde047">
          <span>Candidate · 媒体</span>
          <strong>Media</strong>
          <small>44 due today / 0 weak</small>
        </article>
        <article class="topic is-active" style="--topic:#16a34a;--accent:#84cc16">
          <div>
            <span>Selected · 教育</span>
            <strong>Education</strong>
            <small>80 due today / 0 weak</small>
          </div>
          <div class="due-badge" aria-label="80 due today, 0 weak">
            <strong>80</strong>
            <span>Due today</span>
            <em>0 weak</em>
          </div>
        </article>
        <article class="topic" style="--topic:#2563eb;--accent:#38bdf8">
          <span>Candidate · 科技</span>
          <strong>Technology</strong>
          <small>72 due today / 0 weak</small>
        </article>
        <article class="topic is-far" style="--topic:#dc2626;--accent:#f97316">
          <span>Candidate · 健康</span>
          <strong>Health</strong>
          <small>64 due today / 0 weak</small>
        </article>
      </div>
    </section>
  </main>
</body>
</html>
